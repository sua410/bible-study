  {id:"jer-017", book:"예레미야", chapter:8, type:"multiple", question:"순서와 상관없이 다음 ( ) 안에 들어갈 대상에 속하지 않는 사람은 누구입니까? \"여호와의 말씀이니라 그 때에 사람들이 유다 왕들의 뼈와 그의 ( )의 뼈와 ( )의 뼈와 ( )의 뼈와 ( )의 뼈를 그 무덤에서 끌어내어\"", options:["유다 왕들","학자들","제사장들","선지자들 - 예루살렘 주민"], answer:1},
  {id:"jer-018", book:"예레미야", chapter:8, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까? \"너희가 어찌 우리는 지혜가 있고 우리에게는 여호와의 율법이 있다 말하겠느냐 참으로 ( )의 거짓의 붓이 거짓되게 하였나니\"", options:["율법학자","제사장","선지자","서기관"], answer:3},
  {id:"jer-019", book:"예레미야", chapter:9, type:"fill", question:"다음 ( ) 안에 들어갈 두 단어는 각각 무엇입니까?", body:"\"그들의 ( )는 죽이는 화살이라 거짓을 말하며 ( )으로는 그 이웃에게 평화를 말하나 마음으로는 해를 꾸미는도다\"", answer:"혀 / 입"},
  {id:"jer-020", book:"예레미야", chapter:9, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까? \"( )에서 통곡하는 소리가 들리니 우리가 아주 망하였구나 우리가 크게 부끄러움을 당하였구나 우리가 그 땅을 떠난 것은 그들이 우리 거처를 헐었음이로다 할지로다\"", options:["시온","벧엘","단","사마리아"], answer:0},
  {id:"jer-021", book:"예레미야", chapter:10, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까? \"( )은 어리석어 여호와를 찾지 아니하므로 형통하지 못하며 그 모든 양 떼는 흩어졌도다\"", options:["왕들","제사장들","선지자들","목자들"], answer:3},
  {id:"jer-022", book:"예레미야", chapter:11, type:"multiple", question:"( ) 안에 들어갈 나라 이름은 무엇입니까? \"이 언약을 내가 너희 조상들을 ( ) 땅에서 이끌어낸 날에 명령한 것이라 곧 내가 이르기를 너희는 내 목소리를 순종하고 나의 모든 명령을 따라 행하라 그리하면 너희는 내 백성이 되겠고 나는 너희의 하나님이 되리라\"", options:["잇수르","바벨론","애굽","비사"], answer:2},
  {id:"jer-023", book:"예레미야", chapter:11, type:"multiple", question:"다음 ( ) 안에 들어갈 이방신의 이름은 무엇입니까? \"유다야 네 신들이 네 성읍의 수와 같도다 너희가 예루살렘 거리의 수대로 그 수치스러운 물건의 제단 곧 ( )에게 분향하는 제단을 쌓았도다\"", options:["몰렉","다곤","바알","아세라"], answer:2},
  {id:"jer-024", book:"예레미야", chapter:12, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까? \"( )이/가 내 포도원을 헐며 내 몫을 짓밟아서 내가 기뻐하는 땅을 황무지로 만들었도다\"", options:["많은 왕","많은 제사장","많은 선지자","많은 목자"], answer:3},
  {id:"jer-025", book:"예레미야", chapter:13, type:"multiple", question:"하나님께서는 예레미야에게 유다와 예루살렘의 교만이 다음 (㉮)와 (㉯) 안에 들어갈 물건처럼 버려질 것이라고 선포하셨습니다. 상징적으로 사용된 이 물건들은 무엇입니까? \"너는 사서 네 (㉮)을/를 가지고 일어나 유브라데로 가서 거기서 그것을 바위 틈에 감추라 하시기로 … 내가 유브라데로 가서 그 감추었던 곳을 파고 (㉮)를/을 가져오니 (㉮)이/가 썩어서 쓸 수 없게 되었더라\"", options:["허리에 띤 띠 - 띠","머리에 쓴 관 - 관","나무 멍에 - 멍에","가죽 옷 - 옷"], answer:0},
  {id:"jer-026", book:"예레미야", chapter:13, type:"multiple", question:"이스라엘 백성의 교만을 상징하는 것으로, ( ) 안에 들어갈 나라와 동물의 이름은 무엇입니까? \"( )인이 그의 피부를, ( )이/가 그의 반점을 변하게 할 수 있느냐 할 수 있을진대 악을 익숙히 행하는 너희도 선을 행할 수 있으리라\"", options:["구스 - 표범","애굽 - 사자","아람 - 곰","에돔 - 비둘기"], answer:0},
  {id:"jer-027", book:"예레미야", chapter:14, type:"short", question:"하나님의 심판 대상으로, 다음 ( ) 안에 들어갈 대상은 누구입니까? \"이제 내가 말하되 슬프도소이다 주 여호와여 보시옵소서 ( )들이 그들에게 이르기를 너희가 칼을 보지 아니하겠고 기근은 너희에게 이르지 아니할 것이라 내가 이 곳에서 너희에게 평강을 주리라 하나이다\"", answer:"선지자"},
  {id:"jer-028", book:"예레미야", chapter:14, type:"fill", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"이방인들이 ( ) 가운데 능히 비를 내리게 할 자가 있나이까 하늘이 능히 소나기를 내릴 수 있으리이까 우리 하나님 여호와여 그리하는 자는 주가 아니시니이까 그러므로 우리가 주를 앙망하옵는 것은 주께서 이 모든 것을 만드셨음이니이다 하니라\"", answer:"우상"},
  {id:"jer-029", book:"예레미야", chapter:15, type:"multiple", question:"다음 ( ) 안에 들어갈 인물은 누구입니까? \"여호와께서 내게 이르시되 ( )와/과 ( )이 내 앞에 섰다 할지라도 내 마음은 이 백성을 향할 수 없나니 그들을 내 앞에서 쫓아 내보내라\"", options:["모세 - 아론","모세 - 사무엘","노아 - 욥","다윗 - 솔로몬"], answer:1},
  {id:"jer-030", book:"예레미야", chapter:15, type:"multiple", question:"하나님께서 예레미야에게 명한 이스라엘 백성을 심판하시는 방법으로, (㉮)~(㉱) 안에 들어갈 표현 중 틀린 것은 무엇입니까? \"그들이 만일 네게 말하기를 우리가 어디로 나아가리요 하거든 너는 그들에게 이르기를 여호와께서 이와 같이 말씀하시니라 (㉮)나아가고 (㉯)나아가고 (㉰)나아가고 (㉱)나아갈지니라 하셨다 하라\"", options:["죽을 자는 죽음으로","파멸당할 자는 파멸로","기근을 당할 자는 기근으로","포로 될 자는 포로 됨으로"], answer:1},
  {id:"jer-031", book:"예레미야", chapter:15, type:"multiple", question:"이스라엘 백성을 심판하는 네 가지 벌에 해당하지 않는 것은 무엇입니까? \"여호와의 말씀이니라 내가 그들을 네 가지로 벌하리니 곧 죽이는 ( )과 찢는 ( )와 삼키며 멸하는 공중의 ( )와 땅의 ( )이라 할 것이니라\"", options:["칼","사자","새","짐승"], answer:1},
  {id:"jer-032", book:"예레미야", chapter:16, type:"fill", question:"다음은 유다와 예루살렘의 멸망함과 함께 예레미야의 삶에 대한 하나님의 뜻을 표현한 구절입니다. ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"너는 이 ( )를 취하지 말고 ( )도 두지 말지니라\"", answer:"아내 / 자녀"},
  {id:"jer-033", book:"예레미야", chapter:16, type:"multiple", question:"다음 두 장소는 유다의 예루살렘에 임할 하나님의 심판을 상징합니다. ( ) 안에 들어갈 두 장소는 각각 어디입니까? \"여호와께서 이와 같이 말씀하시되 ( )에 들어가지 말라 가서 통곡하지 말며 그들을 위하여 애곡하지 말라 내가 이 백성에게서 나의 평강을 빼앗으며 인자와 사랑을 제함이라 여호와의 말씀이니라 … 너는 ( )에 들어가서 그들과 함께 앉아 먹거나 마시지 말라\"", options:["초상집 - 잔칫집","초상집 - 혼인집","무덤 - 성소","잔칫집 - 초상집"], answer:0},
  {id:"jer-034", book:"예레미야", chapter:17, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까? \"유다의 죄는 ( ) 끝 철필로 기록되되 그들의 마음 판과 그들의 제단 뿔에 새겨졌거늘\"", options:["금","동","금강석","홍보석"], answer:2},
  {id:"jer-035", book:"예레미야", chapter:17, type:"fill", question:"이스라엘의 회복 조건으로 다음 ( ) 안에 공통으로 들어갈 절기를 지키라고 선포하십니다. ( ) 안에 공통으로 들어갈 단어는 무엇입니까?", body:"\"너희는 스스로 삼가서 ( )에 짐을 지고 예루살렘 문으로 들어오지 말며 … ( )을 거룩히 하여 너희 조상들에게 명령한 것 같이 아무 일도 하지 말지니라\"", answer:"안식일"},
  {id:"jer-036", book:"예레미야", chapter:18, type:"multiple", question:"다음 ( ) 안에 들어갈 단어의 올바른 순서는 무엇입니까? \"그들이 말하기를 오라 우리가 꾀를 내어 예레미야를 치자 ( )에게서 율법이, ( )에게서 책략이, ( )에게서 말씀이 끊어지지 아니할 것이니 오라 우리가 혀로 그를 치고 그의 어떤 말에도 주의하지 말자 하나이다\"", options:["선지자 - 학자 - 제사장","제사장 - 지혜로운 자 - 선지자","서기관 - 지혜로운 자 - 선지자","장로 - 제사장 - 학자"], answer:1},
  {id:"jer-037", book:"예레미야", chapter:19, type:"fill", question:"다음 ( ) 안에 공통으로 들어갈 이방신의 이름은 무엇입니까?", body:"\"또, 그들이 ( )을 위하여 산당을 건축하고 자기 아들들을 ( )에게 번제로 불살라 드렸나니 이는 내가 명령한 일도 아니요 내 마음에 둔 것도 아니니라\"", answer:"바알"},
  {id:"jer-038", book:"예레미야", chapter:19, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까? \"그러므로 보라 다시는 이 곳을 도벳이나 힌놈의 아들의 골짜기라 부르지 아니하고 오직 ( )의 골짜기라 부르는 날이 이를 것이라 여호와의 말이니라\"", options:["죽임","파멸","멸망","피살"], answer:0},
  {id:"jer-039", book:"예레미야", chapter:20, type:"short", question:"유다가 멸망할 것이라는 예레미야의 예언을 듣고 그를 때리고 여호와의 성전에 있는 나무 고랑으로 채운 제사장의 이름은 무엇입니까?", answer:"바스훌"},
  {id:"jer-040", book:"예레미야", chapter:20, type:"fill", question:"예레미야는 욥처럼 자신의 ( )을 저주합니다. ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"내가 ( )이 저주를 받았더면 나의 어머니가 나를 낳던 날이 복이 없었더면\"", answer:"생일"},
  {id:"jer-041", book:"예레미야", chapter:21, type:"multiple", question:"다음 ( ) 안에 들어갈 두 나라 이름은 각각 무엇입니까? \"이스라엘의 하나님 여호와께서 이와 같이 말씀하시되 보라 너희 손에 있는 군기 곧 너희가 성 밖에서 너희를 에워싼 ( )의 왕과 또 너희를 에워싼 ( )인과 싸우는 데 쓰는 너희 무기를 내가 뒤로 돌릴 것이요 그것들을 이 성 가운데에 모아들이리라\"", options:["앗수르 - 애굽","바벨론 - 갈대아","아람 - 에돔","모압 - 블레셋"], answer:1},
  {id:"jer-042", book:"예레미야", chapter:21, type:"multiple", question:"다음 ( ) 안에 들어갈 하나님의 심판 내용은 무엇입니까? \"내가 든 손과 강한 팔 곧 ( )와/과 ( )와/과 ( )로/으로 친히 너희를 칠 것이며\"", options:["칼 - 창 - 활","흑암 - 기근 - 전염병","화 - 재앙 - 가뭄","진노 - 분노 - 대노"], answer:3},
  {id:"jer-043", book:"예레미야", chapter:21, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까? \"여호와의 말씀이니라 내가 나의 얼굴을 이 성읍으로 향함은 ( )을/를 내리기 위함이 아니요 ( )을/를 내리기 위함이라 이 성읍이 바벨론 왕의 손에 넘김이 될 것이요 그는 그것을 불사르리라\"", options:["복 - 화","화 - 복","구원 - 심판","비 - 가뭄"], answer:0},
  {id:"jer-044", book:"예레미야", chapter:22, type:"short", question:"다음 성경 본문에서 언급한 '죽은 자'는 애굽 왕 느고와 므깃도에서 전쟁 중 전사한 유다 왕을 의미합니다. 어떤 왕에 대한 이야기입니까? \"너희는 죽은 자를 위하여 울지 말며 그를 위하여 애통하지 말고 잡혀 간 자를 위하여 슬피 울라 그는 다시 돌아와 그 고국을 보지 못할 것이라\"", answer:"요시야"},
  {id:"jer-045", book:"예레미야", chapter:22, type:"short", question:"다음 ( ) 안에 들어갈 지명은 무엇입니까? \"( )에 살면서 백향목에 깃들이는 자여 여인이 해산하는 고통 같은 고통이 네게 임할 때에 너의 가련함이 얼마나 심하랴\"", answer:"레바논"},
  {id:"jer-046", book:"예레미야", chapter:22, type:"multiple", question:"여호야긴(왕하 24:6) 또는 여고냐(왕하 24:1)로 불리는 인물로, ( ) 안에 들어갈 인물은 누구입니까? \"여호와의 말씀이니라 나의 삶으로 맹세하노니 유다 왕 여호야김의 아들 ( )이/가 나의 오른손의 인장 반지라 할지라도 내가 빼어\"", options:["고니아","스바냐","여호아하스","스룹바벨"], answer:0},
  {id:"jer-047", book:"예레미야", chapter:23, type:"multiple", question:"다음 ( ) 안에 들어갈 대상은 누구입니까? \"이 땅에 ( )가 가득함은 거주민들이 저주로 말미암아 슬퍼하며 광야의 초장들이 마르나니 그들의 행위가 악하고 힘쓰는 것이 정직하지 못하기 때문이로다\"", options:["시기하는 자","불의를 행하는 자","간음하는 자","헛된 것을 가르치는 자"], answer:2},
  {id:"jer-048", book:"예레미야", chapter:23, type:"multiple", question:"하나님의 심판을 받을 ( ) 안에 공통으로 들어갈 대상은 누구입니까? \"나는 사마리아 ( )가 우매함을 보았나니 그들은 바알을 의지하고 예언하여 내 백성 이스라엘을 그릇되게 하였고 … 내가 예루살렘 ( ) 가운데에 가증한 일이 있음을 보았나니 그들은 간음을 행하며 거짓을 말하며 … 그들은 다 내게 대하여 소돔과 다름이 없고 그 주민은 고모라와 다름이 없느니라\"", options:["제사장들","선지자들","장로들","율법학자들"], answer:1},
  {id:"jer-049", book:"예레미야", chapter:23, type:"multiple", question:"다음 ( ) 안에 들어갈 두 도시의 이름은 무엇입니까? \"그들은 다 내게 대하여 ( )와/과 다름이 없고 그 주민은 ( )와/과 다름이 없느니라\"", options:["두로 - 시돈","소돔 - 고모라","사마리아 - 예루살렘","벧엘 - 단"], answer:1},
  {id:"jer-050", book:"예레미야", chapter:24, type:"multiple", question:"하나님께서는 예루살렘에 남겨진 자와 바벨론 포로로 끌려간 자에 대한 논쟁을 다음 (㉮)와 (㉯) 비유를 통해서 예레미야에게 보여주십니다. (㉮)와 (㉯)에 들어갈 단어는 무엇입니까? \"한 광주리에는 처음 익은 (㉮) 같이 좋고 다른 광주리에는 나빠서 먹을 수 없는 극히 나쁜 (㉯)가 있더라\"", options:["좋은 포도 - 나쁜 포도","좋은 무화과 - 나쁜 무화과","좋은 살구 - 나쁜 살구","좋은 거자 - 나쁜 거자"], answer:1},
  {id:"jer-051", book:"예레미야", chapter:24, type:"short", question:"다음에 제시된 다섯 단어 중 다음 ( ) 안에 들어갈 말을 순서대로 써 보십시오. \"내가 ( )와/과 ( )와/과 ( )을/를 그들 가운데 보내 그들이 내가 그들과 그들의 조상들에게 준 땅에서 멸절하기까지 이르게 하리라 하시니라\" [보기: 칼 / 조롱 / 전염병 / 저주 / 기근]", answer:"칼 / 기근 / 전염병"},
  {id:"jer-052", book:"예레미야", chapter:25, type:"short", question:"다음에 제시된 여덟 개의 표현 중 다음 ( ) 안에 들어갈 말을 순서대로 나열한 것은 무엇입니까? \"내가 그들 중에서 ( )와 ( )와 ( )와 ( )와 ( )와 등불 빛이 끊어지게 하리니\" [보기: 기뻐하는 소리 / 신랑의 소리 / 빵 굽는 소리 / 아이 울음 소리 / 신부의 소리 / 나팔 소리 / 맷돌 소리 / 즐거워하는 소리]", answer:"기뻐하는 소리 / 즐거워하는 소리 / 신랑의 소리 / 신부의 소리 / 맷돌 소리"},
  {id:"jer-053", book:"예레미야", chapter:25, type:"multiple", question:"하나님의 심판이 되는 블레셋 다섯 도시에 대한 말씀입니다. ( ) 안에 들어갈 도시가 아닌 것은 무엇입니까? \"모든 섞여 사는 민족들과 우스 땅의 모든 왕과 블레셋 사람의 땅 모든 왕과 ( )과 ( )과 ( )의 나머지 사람들과\"", options:["아스글론","두로","가사","에그론"], answer:1},
  {id:"jer-054", book:"예레미야", chapter:25, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까? \"그러므로 여호와께서 그의 모든 종 ( )을/를 너희에게 끊임없이 보내셨으나 너희가 순종하지 아니하며 듣기 위하여 귀를 기울이지도 아니하였도다\"", options:["선지자","제사장","왕","재판관"], answer:0},
  {id:"jer-055", book:"예레미야", chapter:26, type:"multiple", question:"엘리 제사장 시대에 파괴된 실로가 있었던 곳으로, 다음 ( ) 안에 들어갈 도시는 어디입니까? \"내가 이 성전을 ( ) 같이 되게 하고 이 성이 세계 모든 민족의 저줏거리가 되게 하리라\"", options:["예루살렘","실로","사마리아","헤브론"], answer:1},
  {id:"jer-056", book:"예레미야", chapter:26, type:"multiple", question:"다음 ( ) 안에 들어갈 선지자는 누구입니까? \"유다의 왕 히스기야 시대에 모레셋 사람 ( )이가 유다의 모든 백성에게 예언하여 이르되 만군의 여호와께서 이와 같이 말씀하셨느니라 시온은 밭 같이 경작지가 될 것이며 예루살렘은 돌무더기가 되며 이 성전의 산은 산당의 숲과 같이 되리라 하였느니라\"", options:["요나","학개","미가","요엘"], answer:2},
  {id:"jer-057", book:"예레미야", chapter:26, type:"short", question:"예레미야와 함께 유다와 예루살렘에 재앙이 임할 것을 예언한 사람은 누구입니까?", answer:"우리야"},
  {id:"jer-058", book:"예레미야", chapter:27, type:"short", question:"하나님은 죄악에 대한 심판으로 유다가 바벨론의 지배를 받을 것임을 예레미야에게 말씀하셨습니다. 이때 예레미야가 한 상징적인 행위는 무엇입니까?", answer:"줄과 멍에를 만들어 자신의 목에 걸었다"},
  {id:"jer-059", book:"예레미야", chapter:27, type:"multiple", question:"유다와 예루살렘을 정복했지만 예레미야 선지자를 통해 하나님의 종으로 선택받은 ( ) 안에 들어갈 바벨론 왕은 누구입니까? \"이제 내가 이 모든 땅을 내 종 바벨론의 왕 ( )의 손에 주고 또 들짐승들을 그에게 주어서 섬기게 하였나니\"", options:["느부갓네살","고레스","산헤립","사르곤"], answer:0},
  {id:"jer-060", book:"예레미야", chapter:27, type:"short", question:"유다와 예루살렘에 거짓 예언한 선지자 외에 ( ) 안에 들어갈 대상 중 예레미야와 싸운 사람들은 누구입니까? \"너희는 너희 선지자나 ( )나 ( )나 ( )이가 너희에게 이르기를 너희가 바벨론의 왕을 섬기게 되지 아니하리라 하여도 너희는 듣지 말라\" [보기: 복술가 / 별보는 자 / 제사장 / 꿈꾸는 자 / 술사 / 요술자 / 점치는 자]", answer:"복술가 / 꿈꾸는 자 / 술사 / 요술자"},
  {id:"jer-061", book:"예레미야", chapter:27, type:"short", question:"유다 백성에게 거짓으로 예언한 자들이 선포한 내용의 핵심은 무엇입니까?", answer:"유다 백성이 바벨론 왕을 섬기지 않을 것이다"},
  {id:"jer-062", book:"예레미야", chapter:28, type:"short", question:"예레미야 선지자와 달리 바벨론 왕의 멍에를 꺾을 것이라는 하나님의 말씀을 잘못 전한 거짓 선지자는 누구입니까? \"그 해 곧 유다 왕 시드기야가 다스리기 시작한 지 사 년 다섯째 달 기브온 앗술의 아들 선지자 ( )가 여호와의 성전에서 제사장들과 모든 백성이 보는 앞에서 내게 말하여 이르되\"", answer:"하나냐"},
  {id:"jer-063", book:"예레미야", chapter:28, type:"multiple", question:"거짓 선지자는 바벨론 왕 느부갓네살에게 빼앗겼던 예루살렘 성전의 모든 기구가 몇 년 안에 다시 예루살렘으로 돌아올 것이라고 예언하였습니까? \"내가 바벨론의 왕 느부갓네살에게 빼앗겨 바벨론으로 옮긴 여호와의 성전 모든 기구를 ( ) 년 안에 다시 이 곳으로 되돌려 오리라\"", options:["일","이","삼","사"], answer:1},
  {id:"jer-064", book:"예레미야", chapter:28, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까? \"나는 가서 하나님께 말하여 이르되 여호와의 말씀에 네가 ( ) 멍에들을 깨뜨렸으나 그 대신 ( ) 멍에를 만들었느니라\"", options:["나무 - 쇠","은 - 금","나무 - 놋","갈대 - 구리"], answer:0},
  {id:"jer-065", book:"예레미야", chapter:29, type:"multiple", question:"다음 ( ) 안에 들어갈 바벨론 포로 기간은 얼마입니까? \"여호와께서 이와 같이 말씀하시니라 바벨론에서 ( )이 차면 내가 너희를 돌보고 나의 선한 말을 너희에게 성취하여 너희를 이 곳으로 돌아오게 하리라\"", options:["오십 년","육십 년","칠십 년","팔십 년"], answer:2},
  {id:"jer-066", book:"예레미야", chapter:29, type:"fill", question:"다음 ( ) 안에 들어갈 단어를 순서대로 써 보십시오.", body:"\"여호와의 말씀이니라 너희를 향한 나의 생각을 내가 아나니 ( )이요 ( ) 아니니라 너희에게 ( )와 ( )을 주는 것이니라\"", answer:"평안 / 재앙 / 미래 / 희망"},
  {id:"jer-067", book:"예레미야", chapter:29, type:"fill", question:"다음 ( ) 안에 들어갈 두 인물은 누구입니까?", body:"\"바벨론에 있는 유다의 모든 포로가 그들을 저줏거리로 삼아서 이르기를 여호와께서 너를 바벨론 왕이 불살라 죽인 ( )와/과 ( ) 같이 되게 하시기를 원하노라 하리라 하셨느니라\"", answer:"시드기야 / 아합"},
  {id:"jer-068", book:"예레미야", chapter:30, type:"fill", question:"하나님은 예레미야에게 바벨론에 의해서 유다와 예루살렘이 멸망당하지만 백성들이 포로로 끌려갈 것을 예언하셨지만, 동시에 구원을 약속하셨습니다. 이와 관련하여 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"만군의 여호와의 말씀이니라 내가 네 목에서 그 ( )를 꺾어 버리며 네 ( )을 끊으리니 다시는 이방인을 섬기지 않으리라\"", answer:"멍에 / 포박"},
  {id:"jer-069", book:"예레미야", chapter:30, type:"fill", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"여호와의 ( )는 그의 마음의 뜻한 바를 행하여 이루기까지는 돌이키지 아니하나니 너희가 끝날에 그것을 깨달으리라\"", answer:"진노"},
  {id:"jer-070", book:"예레미야", chapter:31, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까? \"에브라임 산 위에서 ( )이/가 외치는 날이 올 것이라 이르기를 너희는 일어나라 우리가 시온에 올라가서 우리 하나님 여호와께로 나아가자 하리라\"", options:["동산지기","파수꾼","문지기","목동"], answer:1},
  {id:"jer-071", book:"예레미야", chapter:31, type:"multiple", question:"다음 ( ) 안에 들어갈 여인의 이름은 무엇입니까? \"여호와께서 이와 같이 말씀하시니라 라마에서 슬퍼하며 통곡하는 소리가 들리니 ( )이/가 그의 자식 때문에 애곡하는 것이라 그가 자식이 없어져서 위로 받기를 거절하는도다\"", options:["다말","레아","한나","라헬"], answer:3},
  {id:"jer-072", book:"예레미야", chapter:31, type:"fill", question:"다음 ( ) 안에 공통으로 들어갈 단어는 무엇입니까?", body:"\"여호와의 말씀이니라 보라 날이 이르리니 내가 이스라엘 집과 유다 집에 새 ( )을 맺으리라 … 내가 그들의 남편이 되었어도 그들이 내 ( )을 깨뜨렸음이라 여호와의 말씀이니라\"", answer:"언약"},
  {id:"jer-073", book:"예레미야", chapter:32, type:"multiple", question:"하나님은 시위대 뜰에 갇힌 예레미야에게 아나돗에 있는 밭을 사라고 말씀하셨습니다. 이를 통해서 하나님께서 예레미야에게 말씀하시는 상징적인 의미는 무엇입니까?", options:["유다와 예루살렘이 바벨론에 의해서 정복당할 것이다","유다와 예루살렘이 바벨론에 의해 다시 회복될 것이다","예레미야가 자유롭게 풀려날 것이다","유다와 예루살렘의 멸망이 임박했다"], answer:1},
  {id:"jer-074", book:"예레미야", chapter:32, type:"fill", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"주께서 표적과 기사와 강한 손과 펴신 팔과 큰 두려움으로 주의 백성 이스라엘을 애굽 땅에서 인도하여 내시고 그들에게 주시기로 그 조상들에게 맹세하신 바 ( )과 ( )이 흐르는 땅을 그들에게 주셨으므로\"", answer:"젖 / 꿀"},
  {id:"jer-075", book:"예레미야", chapter:32, type:"multiple", question:"다음 ( ) 안에 들어갈 이방신의 이름은 각각 무엇입니까? \"힌놈의 아들의 골짜기에 ( )의 산당을 건축하였으며 자기들의 아들들과 딸들을 ( ) 앞으로 지나가게 하였느니라 그들이 이런 가증한 일을 행하여 유다로 범죄하게 한 것은 내 마음에 둔 것도 아니요 내 생각에 떠오른 것도 아니니라\"", options:["바알 - 몰렉","밀곰 - 하늘의 여왕","다곤 - 별","그모스 - 아세라"], answer:0},
  {id:"jer-076", book:"예레미야", chapter:23, type:"multiple", question:"다음 ( ) 안에 공통으로 들어갈 인물은 누구입니까? \"여호와의 말씀이니라 보라 때가 이르리니 내가 ( )에게 의로운 가지를 일으킬 것이라 그가 왕이 되어 지혜롭게 다스리며 세상에서 정의와 공의를 행할 것이며\" \"그 날 그 때에 내가 ( )에게 한 공의로운 가지가 나게 하리니 그가 이 땅에 정의와 공의를 실행할 것이라\"", options:["이새","다윗","히스기야","요시야"], answer:1},
  {id:"jer-077", book:"예레미야", chapter:33, type:"short", question:"다음 ( ) 안에 들어갈 문구는 무엇입니까? \"너는 내게 부르짖으라 내가 네게 응답하겠고 ( )\"", answer:"네가 알지 못하는 크고 은밀한 일을 네게 보이리라"},
  {id:"jer-078", book:"예레미야", chapter:33, type:"multiple", question:"다음 ( ) 안에 들어갈 인물은 누구입니까? \"내 앞에 번제를 드리며 소제를 사르며 다른 제사를 항상 드릴 ( ) 사람 제사장들도 끊어지지 아니하리라\"", options:["유다","베냐민","레위","에브라임"], answer:2},
  {id:"jer-079", book:"예레미야", chapter:34, type:"fill", question:"안식년 제도와 관련한 내용으로 다음 ( ) 안에 들어갈 말은 무엇입니까?", body:"\"너희 형제 히브리 사람이 네게 팔려 왔거든 너희는 ( ) 되는 해에 그를 놓아 줄 것이니라 그가 ( ) 동안 너를 섬겼은즉 그를 놓아 자유롭게 할지니라 하였으나 너희 선조가 내게 순종하지 아니하며 귀를 기울이지도 아니하였느니라\"", answer:"칠 년 / 육 년"},
  {id:"jer-080", book:"예레미야", chapter:35, type:"short", question:"구약에서 대표적인 '나실인'으로 소개되는 사람으로, 다음 ( ) 안에 들어갈 인물은 누구입니까? \"그들이 이르되 우리는 포도주를 마시지 아니하겠노라 ( )의 아들 우리 선조 요나답이 우리에게 명령하여 이르기를 너희와 너희 자손은 영원히 포도주를 마시지 말며\"", answer:"레갑"},
  {id:"jer-081", book:"예레미야", chapter:35, type:"multiple", question:"레갑 자손들이 하나님 앞에서 지켜야 할 규례에 속하지 않는 것은 무엇입니까?", options:["결혼하지 않을 것","파종하지 않을 것","포도원을 소유하지 않을 것","평생 동안 장막에 살 것"], answer:0},
  {id:"jer-082", book:"예레미야", chapter:36, type:"multiple", question:"여호와의 성전 앞에서 두루마리를 낭독한 ( ) 안에 들어갈 인물은 누구입니까? \"네리야의 아들 ( )이/가 선지자 예레미야가 자기에게 명령한 대로 하여 여호와의 성전에서 책에 있는 여호와의 모든 말씀을 낭독하니라\"", options:["예레미야","바룩","힐기야","여호사밧"], answer:1},
  {id:"jer-083", book:"예레미야", chapter:36, type:"multiple", question:"하나님이 예레미야에게 말씀하신 내용을 기록한 두루마리를 칼로 베고 화로 불에 던진 왕은 누구입니까?", options:["여호야김","시드기야","그다랴","여호야긴"], answer:0},
  {id:"jer-084", book:"예레미야", chapter:37, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까? \"바로의 군대가 애굽에서 나오매 예루살렘을 에워싸고 있던 ( )이 그 소문을 듣고 예루살렘에서 떠났더라\"", options:["갈대아인","잇수르인","바사인","아람인"], answer:0},
  {id:"jer-085", book:"예레미야", chapter:38, type:"multiple", question:"예레미야가 구덩이에 갇혔을 때 그를 구해 준 구스인은 누구입니까?", options:["네리야","엘다단","에벳멜렉","그마라"], answer:2},
  {id:"jer-086", book:"예레미야", chapter:38, type:"short", question:"예레미야가 바벨론의 위협 속에서 유다 시드기야 왕에게 전한 내용으로, 시드기야 왕이 복을 받고 생명을 보전하기 위해서 해야 할 일은 무엇이었습니까?", answer:"바벨론 왕에게 항복하는 것"},
  {id:"jer-087", book:"예레미야", chapter:39, type:"short", question:"하나님의 경고를 무시하고 바벨론에 저항하여 비참한 종말을 맞이한, 다음 ( ) 안에 들어갈 유다 왕은 누구입니까? \"왕이 또 ( )의 눈을 빼고 바벨론으로 옮기려고 사슬로 결박하였더라\"", answer:"시드기야"},
  {id:"jer-088", book:"예레미야", chapter:39, type:"multiple", question:"예루살렘이 함락당한 후에 남은 백성과 예루살렘과 유다 백성을 바벨론의 포로로 끌고 간 사령관의 이름은 무엇입니까?", options:["네르갈사레셀","삼갈네부","살스김","느부사라단"], answer:3},
  {id:"jer-089", book:"예레미야", chapter:40, type:"multiple", question:"예레미야가 포로로 끌려간 나라와 도중에 풀려난 도시로, 다음 ( ) 안에 들어갈 나라와 도시는 각각 어디입니까? \"사령관 느부사라단이 예루살렘과 유다의 포로를 ( )로/으로 옮기는 중에 예레미야도 잡혀 사슬로 결박되어 가다가 ( )에서 풀려난 후에 받음이 여호와로부터 예레미야에게 임하니라\"", options:["앗수르 - 예루살렘","바벨론 - 라마","바벨론 - 사마리아","애굽 - 브엘세바"], answer:1},
  {id:"jer-090", book:"예레미야", chapter:40, type:"multiple", question:"다음 ( ) 안에 들어갈 유다 총독의 이름은 무엇입니까? \"너는 사반의 손자 아히감의 아들 ( )에게 돌아가서 그와 함께 백성 가운데 살거나 네가 좋게 여기는 곳으로 가거나 할지니라 하고 그 사령관이 그에게 양식과 선물을 주어 보내매\"", options:["그다랴","스룹바벨","여호수아","여호야김"], answer:0},
  {id:"jer-091", book:"예레미야", chapter:41, type:"multiple", question:"그다랴를 살해한 ( ) 안에 들어갈 인물은 누구입니까? \"느다냐의 아들 ( )와/과 그와 함께 있던 열 사람이 일어나서 바벨론의 왕이 그 땅을 위임했던 사반의 손자 아히감의 아들 그다랴를 칼로 쳐죽였고\"", options:["요하난","여사냐","하나멜","이스마엘"], answer:3},
  {id:"jer-092", book:"예레미야", chapter:41, type:"short", question:"유다의 총독 그다랴가 살해된 도시는 어디입니까?", answer:"미스바"},
  {id:"jer-093", book:"예레미야", chapter:41, type:"short", question:"다윗 혈통인 이스마엘이 바벨론 왕이 유다의 총독으로 임명한 그다랴를 살해하자 이에 동참했던 사람들이 바벨론의 보복이 두려워 피난처로 택한 나라는 어디입니까?", answer:"애굽"},
  {id:"jer-094", book:"예레미야", chapter:43, type:"multiple", question:"하나님은 예레미야를 통해 애굽에 내려간 이스라엘 백성에게 바벨론 왕 느부갓네살에 의해 애굽이 침략당할 것을 말씀하셨습니다. 다음 ( ) 안에 들어갈 단어는 무엇입니까? \"그가 또 애굽 땅 ( )의 석상들을 깨뜨리고 애굽 신들의 신당들을 불사르리라 하셨다 하라\"", options:["벧엘","벧세메스","람므스","믹돌"], answer:1},
  {id:"jer-095", book:"예레미야", chapter:44, type:"fill", question:"하나님이 이런 이방신을 섬길 것을 결심한 유다 사람의 종교적 삶의 방식입니다. 다음 ( ) 안에 공통으로 들어갈 단어는 무엇입니까?", body:"\"우리가 ( )한 대로 반드시 이행하여 하늘의 여왕에게 분향하고 그 앞에 전제를 드리리라 하였은즉 너희의 ( )를 성취하며 너희의 ( )를 이행하라 하시느니라\"", answer:"서원"},
  {id:"jer-096", book:"예레미야", chapter:44, type:"multiple", question:"바벨론의 심판을 받은 ( ) 안에 들어갈 애굽 왕은 누구입니까? \"보라 내가 유다의 시드기야 왕을 그의 원수 곧 그의 생명을 찾는 바벨론의 느부갓네살 왕의 손에 넘긴 것 같이 애굽의 바로 ( ) 왕을 그의 원수들 곧 그의 생명을 찾는 자들의 손에 넘기리라 여호와께서 이와 같이 말씀하시니라\"", options:["호브라","바로느고","소느보","디르하가"], answer:0},
  {id:"jer-097", book:"예레미야", chapter:45, type:"multiple", question:"예레미야를 대신하여 하나님의 구원의 메시지를 선포한 ( ) 안에 들어갈 사람은 누구입니까? \"유다의 요시야 왕의 아들 여호야김 넷째 해에 네리야의 아들 ( )이/가 예레미야가 불러 주는 대로 이 모든 말을 책에 기록하니라 그 때에 선지자 예레미야가 그에게 말하여 이르되\"", options:["바룩","힐기야","시반","들라야"], answer:0},
  {id:"jer-098", book:"예레미야", chapter:46, type:"multiple", question:"주전 605년 앗수르를 돕기 위해 바벨론으로 원정을 떠난 애굽 느고의 군대가 ( ) 전투에서 패배하였습니다. ( ) 안에 들어갈 지명은 무엇입니까? \"애굽에 관한 것이라 곧 유다의 요시야 왕의 아들 여호야김 넷째 해에 유브라데 강 가 ( )에서 바벨론의 느부갓네살 왕에게 패한 애굽의 바로 느고의 군대에 대한 말씀이라\"", options:["므깃도","갈그미스","바벨론","우르"], answer:1},
  {id:"jer-099", book:"예레미야", chapter:46, type:"short", question:"다음 성경 본문에서 '북으로부터' 또는 '북쪽 백성'으로 비유되는 나라로, 주전 567년에 애굽을 멸망시킨 나라는 어디입니까? \"애굽은 심히 아름다운 암송아지일지라도 북으로부터 파리 떼가 줄곧 오리라 … 애굽의 수치를 당하여 북쪽 백성의 손에 붙임을 당하리로다\"", answer:"바벨론"},
  {id:"jer-100", book:"예레미야", chapter:47, type:"multiple", question:"블레셋이 바벨론에 의해서 멸망당합니다. 블레셋의 멸망의 파괴 과정을 무엇에 비유해서 설명하고 있습니까?", options:["지진","홍수","가뭄","우박"], answer:1},
  {id:"jer-101", book:"예레미야", chapter:48, type:"multiple", question:"애굽, 블레셋 그리고 모압 다음 바벨론에 의해서 멸망당하는 나라로, ( ) 안에 들어갈 신은 무엇입니까? \"이스라엘 집이 벧엘을 의뢰하므로 수치를 당한 것 같이 모압이 ( )로/으로 말미암아 수치를 당하리로다\"", options:["다곤","그모스","아세라","바알"], answer:1},
  {id:"jer-102", book:"예레미야", chapter:49, type:"multiple", question:"바벨론에 의해서 멸망당한 암몬의 수도로, ( ) 안에 공통으로 들어갈 도시 이름은 무엇입니까? \"여호와의 말씀이니라 그러므로 보라 날이 이르리니 내가 전쟁 소리로 암몬 자손의 ( )에 들리게 할 것이라 ( )은/는 폐허 무더기가 되겠고 그 마을들은 불에 탈 것이며 그 때에 이스라엘은 자기를 점령하였던 자들을 점령하리라 여호와의 말씀이니라\"", options:["랍바","디본","두로","헤스본"], answer:0},
  {id:"jer-103", book:"예레미야", chapter:49, type:"short", question:"다음 성경 본문은 어느 나라에 대한 심판 말씀입니까? \"그러나 내가 에서가 숨은 곳을 드러내며 하였으니 그가 그 몸을 숨길 수 없을 것이라 그 자손과 형제와 이웃이 멸망하였은즉 그가 없어졌느니라\"", answer:"에돔"},
  {id:"jer-104", book:"예레미야", chapter:50, type:"multiple", question:"다음 성경 본문은 어느 나라에 대한 하나님의 심판을 발하고 있습니다. 어느 나라에 대한 심판 내용입니까? \"너희는 나라들 가운데에 깃발을 세우고 알리며 숨기지 말고 이르기를 바벨론이 함락되고 ( )이 수치를 당하며 므로닥이 부스러진다 하라\"", options:["애굽","바벨론","암몬","에돔"], answer:1},
  {id:"jer-105", book:"예레미야", chapter:50, type:"short", question:"다음 성경 본문은 하나님께서 약속한 이스라엘 회복에 관한 말씀입니다. 이와 연결하여 다음에 제시된 여덟 지명 중 ( ) 안에 들어갈 지명을 순서대로 나열한 것은 무엇입니까? \"이스라엘을 다시 그의 목장으로 돌아가게 하리니 그가 ( )와/과 ( )에서 양을 기를 것이며 그의 마음이 ( )와/과 ( ) 산에서 만족하리라\" [보기: 갈멜 / 사마리아 / 길보아 / 길르앗 / 바산 / 에브라임 / 벧엘 / 그리심]", answer:"갈멜 / 바산 / 에브라임 / 길르앗"},
  {id:"jer-106", book:"예레미야", chapter:51, type:"multiple", question:"바벨론의 신으로 숭배되었던 '마르둑'의 다른 이름으로 ( ) 안에 들어갈 신의 이름은 무엇입니까? \"내가 ( )을/를 바벨론에서 벌하고 그가 삼킨 것을 그의 입에서 끌어내리라 … 바벨론 성벽은 무너졌도다\"", options:["벨","그모스","다곤","바알"], answer:0},
  {id:"jer-107", book:"예레미야", chapter:51, type:"multiple", question:"다음 ( ) 안에 공통으로 들어갈 나라 이름은 무엇입니까? \"( )은/는 여호와의 손에 잡혀 있어 온 세계가 취하게 하는 금잔이라 뭇 민족이 그 포도주를 마심으로 미쳤도다 … ( )이/가 갑자기 넘어져 파멸되니 이로 말미암아 울라 … 그가 치료받을까 하노라\"", options:["앗수르","메대","바벨론","애굽"], answer:2},
  {id:"jer-108", book:"예레미야", chapter:52, type:"multiple", question:"( ) 안에 들어갈 유다 왕은 누구입니까? \"( )의 눈을 빼고 놋사슬로 결박하여 바벨론 왕이 그를 바벨론으로 끌고 가서 그가 죽는 날까지 옥에 가두었더라\"", options:["여호야김","여호야긴","시드기야","여호아하스"], answer:2},
  {id:"jer-109", book:"예레미야", chapter:52, type:"multiple", question:"다음 (㉮)와 (㉯)에 들어갈 유다와 바벨론 왕은 누구입니까? \"유다 왕 (㉮)이/가 사로잡힌 지 삼십칠 년 곧 바벨론의 (㉯) 왕의 즉위 원년 열두째 달 … 그가 유다의 (㉮) 왕의 머리를 들어 … 감옥에서 풀어 주었더라\"", options:["여호야긴 - 에윌므로닥","여호야김 - 느부갓네살","시드기야 - 느부갓네살","시드기야 - 에윌므로닥"], answer:0},
  {id:"lam-001", book:"예레미야애가", chapter:1, type:"short", question:"예레미야애가는 서두에 나오는 '이 성'의 멸망에 대한 애가입니다. '이 성'은 어느 도시를 의미합니까?", body:"\"슬프다 이 성이여 전에는 사람들이 많더니 이제는 어찌 그리 적막하게 앉았는고 전에는 열국 중에 크던 자가 이제는 과부 같이 되었고 전에는 열방 중에 공주였던 자가 이제는 강제 노동을 하는 자가 되었도다\"(애 1)", answer:"예루살렘"},
  {id:"lam-002", book:"예레미야애가", chapter:2, type:"fill", question:"다음 ( ) 안에 들어갈 대상은 누구입니까?", body:"\"성문이 땅에 묻히며 빗장이 부서져 파괴되고 왕과 지도자들이 율법 없는 이방인들 가운데에 있으며 그 성의 ( )들은 여호와의 묵시를 받지 못하는도다\"(애 2)", answer:"선지자"},
  {id:"lam-003", book:"예레미야애가", chapter:2, type:"fill", question:"다음 (㉮)와 (㉯)에 들어갈 단어는 각각 무엇입니까?", body:"\"주께서 그의 초막을 동산처럼 헐어 버리시며 그의 (㉮)를 폐하셨도다 여호와께서 시온에서 (㉮)와 (㉯)을 잊어버리게 하시며 그가 진노하사 왕과 제사장을 멸시하셨도다\"(애 2)", answer:"절기 / 안식일"},
  {id:"lam-004", book:"예레미야애가", chapter:3, type:"short", question:"여호와의 분노의 매로 말미암아 고난 당한 자는 누구입니까?(애 3)", answer:"예레미야 자신"},
  {id:"lam-005", book:"예레미야애가", chapter:3, type:"multiple", question:"다음 ( ) 안에 들어갈 표현은 무엇입니까?", body:"\"사람이 ( )을/를 바라고 잠잠히 기다림이 좋도다\"(애 3)", options:["여호와의 구원","여호와의 응답","여호와의 선하심","여호와의 은혜"], answer:0},
  {id:"lam-006", book:"예레미야애가", chapter:4, type:"fill", question:"예루살렘이 멸망한 이유는 하나님 앞에서 다음 ( ) 안에 공통으로 들어갈 도시보다 악했기 때문입니다. 이 도시의 이름은 무엇입니까?", body:"\"전에 ( )이 사람의 손을 대지 아니하였는데도 순식간에 무너지더니 이제는 딸 내 백성의 죄가 ( )의 죄악보다 무겁도다\"(애 4)", answer:"소돔"},
  {id:"lam-007", book:"예레미야애가", chapter:4, type:"short", question:"다음 (㉮)(㉯)(㉰)(㉱) 안에 순서대로 들어가는 단어들은 무엇입니까? [보기] ㉠피 ㉡눈 ㉢재 ㉣숯 ㉤젖 ㉥산호들 ㉦석류 ㉧우유", body:"\"전에는 존귀한 자들의 몸이 (㉮)보다 깨끗하고 (㉯)보다 희며 (㉰)보다 붉어 그들의 윤택함이 갈아서 빛낸 청옥 같더니 이제는 그들의 얼굴이 (㉱)보다 검고 그들의 가죽이 뼈들에 붙어 막대기 같이 말랐으니 어느 거리에서든지 알아볼 사람이 없도다\"(애 4)", answer:"눈 - 젖 - 산호들 - 숯 (㉡-㉤-㉥-㉣)"},
  {id:"lam-008", book:"예레미야애가", chapter:4, type:"short", question:"다음 (㉮)와 (㉯)에 들어갈 대상은 각각 누구입니까?", body:"\"그의 (㉮)의 죄들과 (㉯)의 죄악들 때문이니 그들이 성읍 안에서 의인들의 피를 흘렸도다\"(애 4)", answer:"선지자들 / 제사장들"},
  {id:"lam-009", book:"예레미야애가", chapter:4, type:"multiple", question:"다음 ( ) 안에 들어갈 표현은 무엇입니까?", body:"\"우리의 콧김 곧 여호와께서 ( )가 그들의 함정에 빠졌음이여 우리가 그를 가리키며 전에 이르기를 우리가 그의 그늘 아래에서 이방인들 중에 살겠다 하던 자로다\"(애 4)", options:["부르신 자","기름 부으신 자","남겨 놓은 자","선택한 자"], answer:1},
  {id:"lam-010", book:"예레미야애가", chapter:5, type:"fill", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"우리의 머리에서는 ( )이 떨어졌사오니 오호라 우리의 범죄 때문이니이다\"(애 5)", answer:"면류관"},
  {id:"lam-011", book:"예레미야애가", chapter:5, type:"fill", question:"성경은 예루살렘의 멸망을 다음과 같은 상황으로 비유하였습니다. ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"우리는 아버지 없는 ( )들이오며 우리의 어머니는 ( )들 같으니\"(애 5)", answer:"고아 / 과부"},
  {id:"lam-012", book:"예레미야애가", chapter:5, type:"multiple", question:"다음 ( ) 안에 들어갈 동물의 이름은 무엇입니까?", body:"\"시온 산이 황폐하여 ( )이/가 그 안에서 노니나이다\"(애 5)", options:["이리","노루","여우","사슴"], answer:2},
  {id:"eze-001", book:"에스겔", chapter:1, type:"fill", question:"에스겔이 선지자로 소명받을 때의 설명입니다. 다음 ( ) 안에 들어갈 유다 왕은 누구입니까?", body:"\"( )왕이 사로잡힌 지 오 년 그 날 초닷새라\"(겔 1)", answer:"여호야긴"},
  {id:"eze-002", book:"에스겔", chapter:1, type:"multiple", question:"( ) 안에 들어갈 에스겔의 출신 신분은 무엇입니까?", body:"\"갈대아 땅 그발 강 가에서 여호와의 말씀이 부시의 아들 ( ) 에스겔에게 특별히 임하고 여호와의 권능이 내 위에 있으니라\"(겔 1)", options:["제사장","선지자","서기관","학자"], answer:0},
  {id:"eze-003", book:"에스겔", chapter:1, type:"multiple", question:"하나님은 에스겔에게 네 생물의 형상을 환상 속에 보여주셨습니다. 그가 본 네 생물의 얼굴 모양에 속하지 않는 것은 무엇입니까?(겔 1)", options:["사람","사자","곰","독수리"], answer:2},
  {id:"eze-004", book:"에스겔", chapter:2, type:"fill", question:"하나님께서 에스겔을 선지자로 부르실 때 다음과 같이 칭하셨습니다. ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"그가 내게 이르시되 ( )야 네 발로 일어서라 내가 네게 말하리라 하시며\"(겔 2)", answer:"인자"},
  {id:"eze-005", book:"에스겔", chapter:2, type:"multiple", question:"여호와의 영광의 형상이 에스겔에게 입을 벌리고 먹으라고 명한 것은 무엇입니까?", body:"\"내가 보니 보라 한 손이 나를 향하여 펴지고 보라 그 안에 ( )이/가 있더라\"(겔 2)", options:["진설병","두루마리 책","가시","칼"], answer:1},
  {id:"eze-006", book:"에스겔", chapter:3, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"인자야 내가 너를 이스라엘 족속의 ( )(으)로 세웠으니 너는 내 입의 말을 듣고 나를 대신하여 그들을 깨우치라\"(겔 3)", options:["목자","파수꾼","기름부음 받은 자","지혜자"], answer:1},
  {id:"eze-007", book:"에스겔", chapter:3, type:"multiple", question:"다음 (㉮)와/과 (㉯)에 들어갈 표현은 무엇입니까?", body:"\"내가 네 혀를 네 입천장에 붙게 하여 네가 (㉮)가 되어 그들을 (㉯)가 되지 못하게 하리니 그들은 패역한 족속임이니라\"(겔 3)", options:["말 못하는 자, 꾸짖는 자","말 못하는 자, 듣지 못하는 자","듣지 못하는 자, 꾸짖는 자","걷지 못하는 자, 말 못하는 자"], answer:0},
  {id:"eze-008", book:"에스겔", chapter:4, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"너 인자야 ( )을 가져다가 그것을 네 앞에 놓고 한 성읍 곧 예루살렘을 그 위에 그리고\"(겔 4)", options:["목판","토판","벽판","동판"], answer:1},
  {id:"eze-009", book:"에스겔", chapter:4, type:"multiple", question:"다음 ( )에 들어갈 각각의 숫자는 얼마입니까?", body:"\"내가 그들의 범죄한 햇수대로 네게 날수를 정하였노니 곧 ( )일이니라 ... 네 매 하루를 ( )일로 정하였노니 하루가 일 년이니라\"(겔 4)", options:["백구십 - 육십","백사십 - 칠십","삼백구십 - 사십","삼백육십 - 십이"], answer:2},
  {id:"eze-010", book:"에스겔", chapter:5, type:"fill", question:"예루살렘의 완전한 멸망을 상징적으로 표현한 것으로, 하나님은 무엇을 깎으라고 에스겔에게 명령하셨습니까?", body:"\"너 인자야 너는 날카로운 칼을 가져다가 삭도로 삼아 네 ( )과 ( )을 깎아서 저울로 달아 나누어 두라\"(겔 5)", answer:"머리털 / 수염"},
  {id:"eze-011", book:"에스겔", chapter:6, type:"short", question:"다음 (㉮), (㉯), (㉰)에 순서대로 들어갈 단어는 무엇입니까?", body:"\"마침내 ㉮과/와 ㉯과 ㉰ 망하되 멀리 있는 자는 ㉮에 죽고 가까운 데 있는 자는 ㉯에 엎드러지며 ... 에워싸인 자는 ㉰에 죽으리라\"(겔 6)", answer:"㉮ 전염병, ㉯ 칼, ㉰ 기근"},
  {id:"eze-012", book:"에스겔", chapter:7, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 유다 백성이 바벨론으로 사로잡혀 갈 것을 상징하는 물건입니다. ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"너는 ( )을/를 만들라 이 땅에 피 흘린 죄가 가득하고 이 성읍에 포악이 가득함이라\"(겔 7)", options:["멍에","가시관","쇠사슬","족쇄"], answer:2},
  {id:"eze-013", book:"에스겔", chapter:7, type:"short", question:"다음 (㉮), (㉯), (㉰)에 순서대로 들어갈 단어는 무엇입니까?", body:"\"그들이 ㉮에게서 묵시를 구하나 헛될 것이며 ㉯에게서는 율법이 없어지고 ㉰에게서는 책략이 없어질 것이며\"(겔 7)", answer:"㉮ 선지자, ㉯ 제사장, ㉰ 장로"},
  {id:"eze-014", book:"에스겔", chapter:8, type:"multiple", question:"( ) 안에 들어갈 인물은 누구입니까?", body:"\"이스라엘 족속의 장로 중 칠십 명이 그 앞에 섰으며 사반의 아들 ( )도 그 가운데에 섰고 각기 손에 향로를 들었는데 향연이 구름 같이 오르더라\"(겔 8)", options:["야아사냐","하나멜","요하난","느다냐"], answer:0},
  {id:"eze-015", book:"에스겔", chapter:8, type:"multiple", question:"다음 ( ) 안에 들어갈 이방신은 메소포타미아 지역에서 '풍요의 신'으로 숭배되었습니다. 이 신의 이름은 무엇입니까?", body:"\"여호와의 전으로 들어가는 북문에 이르시기로 보니 거기에 여인들이 앉아 ( )을/를 위하여 애곡하더라\"(겔 8)", options:["벨","담무스","바알","드라빔"], answer:1},
  {id:"eze-016", book:"에스겔", chapter:8, type:"multiple", question:"유다 므낫세 통치 시기에 유입된 앗수르 종교의 한 형태로, 이 대상을 숭배하기 시작했습니다. ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"약 스물다섯 명이 여호와의 성전을 등지고 낯을 동쪽으로 향하여 동쪽 ( )에게 예배하더라\"(겔 8)", options:["해","달","별","불"], answer:0},
  {id:"eze-017", book:"에스겔", chapter:9, type:"multiple", question:"다음 ( ) 안에 공통으로 들어갈 대상은 누구입니까?", body:"\"그 중의 한 사람은 가는 베 옷을 입고 허리에 ( )의 먹 그릇을 찼더라 ... 여호와께서 그 가는 베 옷을 입고 ( )의 먹 그릇을 찬 사람을 불러\"(겔 9)", options:["서기관","제사장","선지자","왕"], answer:0},
  {id:"eze-018", book:"에스겔", chapter:9, type:"multiple", question:"다음 ( ) 안에 들어갈 대상은 누구입니까?", body:"\"늙은 자와 젊은 자와 처녀와 어린이와 여자를 다 죽이되 ( )에게는 가까이 하지 말라 내 성소에서 시작할지니라\"(겔 9)", options:["할례받은 자","베옷을 입은 자","이마에 표 있는 자","머리에 띠 두른 자"], answer:2},
  {id:"eze-019", book:"에스겔", chapter:10, type:"multiple", question:"하나님의 예루살렘에 대한 심판을 상징하는 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"너는 그룹 밑에 있는 바퀴 사이로 들어가서 그 손에 ( )을/를 두 손에 가득히 움켜 가지고 성읍 위에 흩으라\"(겔 10)", options:["숯불","재","불칼","철"], answer:0},
  {id:"eze-020", book:"에스겔", chapter:10, type:"multiple", question:"에스겔이 본 환상 중 다음 ( ) 안에 들어갈 말이 아닌 것은 무엇입니까?", body:"\"그룹들에게는 각기 네 얼굴이 있는데 ... 그룹의 얼굴, 사람의 얼굴, 사자의 얼굴, 독수리의 얼굴이더라\"(겔 10)", options:["그룹","사람","사자","소"], answer:3},
  {id:"eze-021", book:"에스겔", chapter:10, type:"fill", question:"예루살렘 멸망과 함께 여호와의 영광은 무엇을 떠나갔습니까? ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"여호와의 영광이 성전 ( )을 떠나서 그룹들 위에 머무르니\"(겔 10)", answer:"문지방"},
  {id:"eze-022", book:"에스겔", chapter:11, type:"multiple", question:"상징적인 의미에서 사용된 다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"이 성읍은 ( )이/가 되고 우리는 ( )이/가 된다 하나니\"(겔 11)", options:["가마 - 고기","죽음 - 생명","바퀴 - 생물","쇠사슬 - 구름"], answer:0},
  {id:"eze-023", book:"에스겔", chapter:11, type:"multiple", question:"다음 ( ) 안에 들어갈 나라는 어디입니까?", body:"\"주의 영이 나를 들어 하나님의 영의 환상 중에 데리고 ( )에 사로잡힌 자 중에 이르시더니\"(겔 11)", options:["애굽","앗수르","갈대아","바사"], answer:2},
  {id:"eze-024", book:"에스겔", chapter:12, type:"fill", question:"유다 백성들이 포로가 되어 끌려갈 것을 상징하는 ( ) 안에 공통으로 들어갈 단어는 무엇입니까?", body:"\"너는 낮에 그들의 목전에서 ( )을/를 꾸려 ... 사로잡힐 ( )(으)로 그들의 목전에서 끌어내라\"(겔 12)", answer:"행구"},
  {id:"eze-025", book:"에스겔", chapter:12, type:"multiple", question:"예루살렘 멸망 예언과 관련하여 에스겔에게 보인 징조로, ( ) 안에 들어갈 말은 무엇입니까?", body:"\"인자야 너는 ( ) 네 음식을 먹고 ( ) 네 물을 마시며\"(겔 12)", options:["울면서 - 슬퍼하면서","떨면서 - 놀라고 근심하면서","앉아서 - 일어서서","허리에 띠를 띠고 - 발에 신을 신고"], answer:1},
  {id:"eze-026", book:"에스겔", chapter:13, type:"multiple", question:"다음 ( ) 안에 들어갈 동물은 무엇입니까?", body:"\"이스라엘아 너의 선지자들은 황무지에 있는 ( ) 같으니라\"(겔 13)", options:["사자","곰","독수리","여우"], answer:3},
  {id:"eze-027", book:"에스겔", chapter:13, type:"multiple", question:"다음은 거짓 선지자에 관한 성경 본문입니다. ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"어찌 헛된 ( )을/를 보며 거짓된 ( )을/를 말한 것이 아니냐\"(겔 13)", options:["환상 - 행위","묵시 - 점괘","예언 - 발언","이상 - 징조"], answer:1},
  {id:"eze-028", book:"에스겔", chapter:14, type:"short", question:"에스겔 14장에서 언급된 구약의 인물을 의인으로 꼽는 세 명의 인물은 누구입니까?(겔 14)", answer:"노아, 다니엘, 욥"},
  {id:"eze-029", book:"에스겔", chapter:14, type:"multiple", question:"다음 성경 본문 중 ( ) 안에 들어갈 단어로 옳지 않은 것은 무엇입니까?", body:"\"내가 나의 네 가지 중한 벌 곧 ( )과 ( )과 ( )과 ( )를 예루살렘에 함께 내려\"(겔 14)", options:["칼","기근","우박","전염병"], answer:2},
  {id:"eze-030", book:"에스겔", chapter:15, type:"multiple", question:"다음 ( ) 안에 들어갈 나무의 이름은 무엇입니까?", body:"\"인자야 ( )가 모든 나무보다 나은 것이 무엇이랴\"(겔 15)", options:["포도나무","무화과나무","감람나무","석류나무"], answer:0},
  {id:"eze-031", book:"에스겔", chapter:16, type:"fill", question:"다음 ( ) 안에 들어갈 단어는 각각 무엇입니까?", body:"\"네 근본과 난 땅은 ( )이요 네 아버지는 ( ) 사람이요 네 어머니는 ( ) 사람이라\"(겔 16)", answer:"가나안 / 아모리 / 헷"},
  {id:"eze-032", book:"에스겔", chapter:16, type:"multiple", question:"다음 ( ) 안에 들어갈 표현 중 알맞지 않은 것은 무엇입니까?", body:"\"네가 날 때에 네 ( )\"(겔 16)", options:["배꼽 줄을 자르지 아니하였고","물로 씻어 정결하게 하지 아니하였고","향유 바르지 아니하였고","강보로 싸지 아니하였고"], answer:2},
  {id:"eze-033", book:"에스겔", chapter:16, type:"short", question:"하나님은 예루살렘의 타락함을 여러 나라와의 음행에 비유하셨습니다. (㉮), (㉯), (㉰)에 들어갈 나라를 순서대로 쓰십시오.", body:"\"하체가 큰 네 이웃 나라 ㉮ 사람과 음행하되 ... 또 ㉯ 사람과 행음하고 ... 장사하는 땅 ㉰에까지 심히 행음하되\"(겔 16)", answer:"㉮ 애굽, ㉯ 앗수르, ㉰ 갈대아"},
  {id:"eze-034", book:"에스겔", chapter:16, type:"multiple", question:"에스겔이 언급한 소돔의 죄악에 속하지 않은 것은 무엇입니까?(겔 16)", options:["교만함","음식물의 풍족함","태평함","거짓말"], answer:3},
  {id:"eze-035", book:"에스겔", chapter:17, type:"multiple", question:"상징적인 의미로 사용된 ( ) 안에 공통으로 들어갈 단어는 무엇입니까?", body:"\"큰 ( )가 레바논에 이르러 백향목 높은 가지를 꺾고 ...\"(겔 17)", options:["독수리","사자","곰","여우"], answer:0},
  {id:"eze-036", book:"에스겔", chapter:17, type:"fill", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"그 위에 내 ( )을 치며 내 ( )에 걸리게 하여 끌고 바벨론으로 가서 나를 반역한 그 반역을 거기에서 심판할지며\"(겔 17)", answer:"그물 / 올무"},
  {id:"eze-037", book:"에스겔", chapter:18, type:"fill", question:"다음 ( ) 안에 공통으로 들어갈 단어는 무엇입니까?", body:"\"모든 ( )이 다 내게 속하였나니 아버지의 ( )이 내게 속함 같이 그의 아들의 ( )도 내게 속하였은즉 범죄하는 그 ( )은 죽으리라\"(겔 18)", answer:"영혼"},
  {id:"eze-038", book:"에스겔", chapter:18, type:"fill", question:"(㉮)와/과 (㉯)에 들어갈 단어는 무엇입니까?", body:"\"어찌 ㉮이 죽는 것을 조금인들 기뻐하랴 ... 만일 ㉯이 그 공의를 떠나 죄악을 행하면 ... 만일 ㉯이 그 행한 악을 떠나 정의와 공의를 행하면 그 영혼을 보전하리라\"(겔 18)", answer:"㉮ 악인 / ㉯ 의인"},
  {id:"eze-039", book:"에스겔", chapter:19, type:"short", question:"(㉮)로 비유된 유다의 마지막 왕들을 일부는 (㉯)에, 일부는 (㉰)에 포로로 끌고 갔습니다. (㉮), (㉯), (㉰)에 들어갈 단어는 무엇입니까?", body:"\"젊은 ㉮이 되어 먹이 물어뜯기를 배워 사람을 삼키매 ... 끌고 ㉯ 땅으로 갔고 ... 갈고리를 꿰어 끌고 ㉰ 왕에게 이르렀고\"(겔 19)", answer:"㉮ 사자, ㉯ 애굽, ㉰ 바벨론"},
  {id:"eze-040", book:"에스겔", chapter:20, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"또 내가 그들을 거룩하게 하는 여호와인 줄 알게 하려고 내 ( )을/를 주어 그들과 나 사이에 표징을 삼았노라\"(겔 20)", options:["언약궤","할례","안식일","율법"], answer:2},
  {id:"eze-041", book:"에스겔", chapter:20, type:"fill", question:"출애굽한 이스라엘 백성이 들어갈 가나안 땅을 묘사하는 대표적인 표현으로 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"내가 그들에게 허락한 땅 곧 ( )과 ( )이 흐르는 땅이요 모든 땅 중의 아름다운 곳\"(겔 20)", answer:"젖 / 꿀"},
  {id:"eze-042", book:"에스겔", chapter:21, type:"multiple", question:"다음 ( ) 안에 들어갈 도시의 이름은 무엇입니까?", body:"\"칼이 암몬 족속의 ( )에 이르는 길과 유다의 견고한 성 ( )에 이르는 길을 그리라\"(겔 21)", options:["랍바 - 예루살렘","두로 - 예루살렘","랍바 - 사마리아","다메섹 - 라기스"], answer:0},
  {id:"eze-043", book:"에스겔", chapter:21, type:"multiple", question:"고대 근동 지역에서는 희생 제물로 봉헌되는 동물의 ( )을 점칠 때 사용했습니다. ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"바벨론 왕이 ... 점을 치되 ... 희생제물의 ( )을/를 살펴서\"(겔 21)", options:["간","심장","피","뼈"], answer:0},
  {id:"eze-044", book:"에스겔", chapter:22, type:"fill", question:"유다 왕국의 멸망을 비유적으로 표현한 말로, ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"이스라엘 족속이 내게 찌꺼기가 되었나니 곧 ( )불 가운데에 있는 놋이나 주석이나 쇠나 납이며 곧 은 찌꺼기로다\"(겔 22)", answer:"풀무"},
  {id:"eze-045", book:"에스겔", chapter:22, type:"short", question:"하나님의 심판 대상이 되는 (㉮), (㉯), (㉰)에 들어갈 단어는 무엇입니까?", body:"\"그 가운데에서 ㉮들의 반역함이 우는 사자가 음식을 움킴 같았으되 ... ㉯들은 율법을 범하였으며 ... ㉰들은 이익을 얻으려고 피를 흘려 영혼을 멸하려 하였고\"(겔 22)", answer:"㉮ 선지자, ㉯ 제사장, ㉰ 고관"},
  {id:"eze-046", book:"에스겔", chapter:23, type:"short", question:"하나님의 심판을 받은 (㉮)와 (㉯)에 들어갈 도시 이름은 무엇입니까?", body:"\"그 이름으로 말하면 오홀라는 ㉮요 오홀리바는 ㉯이니라\"(겔 23)", answer:"㉮ 사마리아(오홀라), ㉯ 예루살렘(오홀리바)"},
  {id:"eze-047", book:"에스겔", chapter:23, type:"short", question:"오홀라와 오홀리바가 행음한 대상은 각각 누구입니까?(겔 23)", answer:"오홀라: 앗수르, 오홀리바: 바벨론(갈대아)"},
  {id:"eze-048", book:"에스겔", chapter:24, type:"multiple", question:"하나님은 타락한 예루살렘의 비참한 현실을 비유로 예언하셨습니다. ( ) 안에 공통으로 들어갈 단어는 무엇입니까?", body:"\"녹슨 ( ) 곧 그 속의 녹을 없애지 아니한 ( )이여 화 있을진저\"(겔 24)", options:["잔","그릇","쟁반","가마"], answer:3},
  {id:"eze-049", book:"에스겔", chapter:24, type:"short", question:"다음은 하나님께서 에스겔에게 누구의 죽음에 관하여 말씀하신 내용입니까?", body:"\"인자야 내가 네 눈에 기뻐하는 것을 한 번 쳐서 빼앗으리니 슬퍼하거나 울거나 눈물을 흘리거나 하지 말며\"(겔 24)", answer:"에스겔의 아내"},
  {id:"eze-050", book:"에스겔", chapter:25, type:"short", question:"다음 본문에서 하나님의 심판을 받을 두 나라의 이름은 무엇입니까?", body:"\"내가 랍바를 낙타의 우리로 만들며 ( ) 족속의 땅을 양 떼가 눕는 곳으로 삼은즉 ... 내가 ( )의 한편 곧 그 나라 국경에 있는 영화로운 성읍 벧여시못과 바알므온과 기랴다임을 열고\"(겔 25)", answer:"암몬, 모압"},
  {id:"eze-051", book:"에스겔", chapter:25, type:"short", question:"다음 본문에서 하나님의 심판을 받을 두 나라의 이름은 무엇입니까?", body:"\"내가 내 손을 ( ) 위에 펴서 ... 데만에서부터 황폐하게 하리니 드단까지 칼에 엎드러지게 할지라 ... 내가 ( ) 사람 위에 손을 펴서 그렛 사람을 끊으며\"(겔 25)", answer:"에돔, 블레셋"},
  {id:"eze-052", book:"에스겔", chapter:27, type:"multiple", question:"다음 본문에서 하나님의 심판을 받을 ( ) 안에 공통으로 들어갈 도시 이름은 무엇입니까?", body:"\"너는 ( )을/를 향하여 이르기를 ... ( )이여 네가 말하기를 나는 온전히 아름답다 하였도다\"(겔 27)", options:["다메섹","랍바","니느웨","두로"], answer:3},
  {id:"eze-053", book:"에스겔", chapter:27, type:"multiple", question:"다음 ( ) 안에 들어갈, 연안에 위치한 도시의 이름은 무엇입니까?", body:"\"( )의 배는 떼를 지어 네 화물을 나르니 네가 바다 중심에서 풍부하여 영화가 매우 크도다\"(겔 27)", options:["다메섹","다시스","하란","두로"], answer:1},
  {id:"eze-054", book:"에스겔", chapter:28, type:"multiple", question:"하나님의 심판을 받는 두로의 영화를 빗댄, 다음 ( ) 안에 들어갈 인물은 누구입니까?", body:"\"네가 ( )보다 지혜로워서 은밀한 것을 깨닫지 못할 것이 없다 하고\"(겔 28)", options:["욥","노아","다니엘","솔로몬"], answer:2},
  {id:"eze-055", book:"에스겔", chapter:28, type:"short", question:"하나님의 심판을 받는, 페니키아의 대표적인 두 도시의 이름은 무엇입니까?(겔 28)", answer:"두로, 시돈"},
  {id:"eze-056", book:"에스겔", chapter:29, type:"multiple", question:"다음 본문에서 하나님의 심판을 받을 ( ) 안에 들어갈 나라의 이름은 무엇입니까?", body:"\"내가 너와 네 강들을 쳐서 ( ) 땅 믹돌에서부터 수에네 곧 구스 지경까지 황폐하게 하리니\"(겔 29)", options:["애굽","앗수르","바벨론","바사"], answer:0},
  {id:"eze-057", book:"에스겔", chapter:30, type:"fill", question:"애굽 왕의 교만을 상징하는 것으로 다음 ( ) 안에 공통으로 들어갈 신체 부위는 무엇입니까?", body:"\"내가 애굽의 바로 왕을 대적하여 그 두 ( ) 곧 성한 ( )과 이미 꺾인 ( )를 꺾어서 칼이 그 손에서 떨어지게 하고\"(겔 30)", answer:"팔"},
  {id:"eze-058", book:"에스겔", chapter:31, type:"short", question:"다음 성경 본문을 통해 교만한 애굽을 비유한 나무는 무엇입니까?", body:"\"그 키가 크고 꼭대기가 구름에 닿아서 높이 솟아났으므로 마음이 교만하였은즉\"(겔 31)", answer:"백향목(레바논 백향목)"},
  {id:"eze-059", book:"에스겔", chapter:31, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"그들도 그와 함께 ( )에 내려 칼에 죽임을 당한 자에게 이르렀나니\"(겔 31)", options:["스올","무덤","바다","구렁이"], answer:0},
  {id:"eze-060", book:"에스겔", chapter:32, type:"multiple", question:"교만한 애굽 왕을 상징하는 ( ) 안에 들어갈 동물은 무엇입니까?", body:"\"너는 여러 나라에서 사자로 생각하였더니 실상은 바다 가운데의 ( )라\"(겔 32)", options:["악어","하마","용","뱀"], answer:0},
  {id:"eze-061", book:"에스겔", chapter:32, type:"fill", question:"이스라엘이 이방인들을 비방하거나 경멸할 때 사용한 말로, 에스겔에서 자주 사용한 ( ) 안에 공통으로 들어갈 단어는 무엇입니까?", body:"\"그들이 ( )를 받지 못한 자 가운데에 ... 너도 ( )를 받지 못한 자와 함께 패망함을 당하리니\"(겔 32)", answer:"할례"},
  {id:"eze-062", book:"에스겔", chapter:33, type:"multiple", question:"하나님은 에스겔에게 ( )의 사명을 주셨습니다. 다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"내가 너를 이스라엘 족속의 ( )으로 삼음이 이와 같으니라 ... 내 입의 말을 듣고 나를 대신하여 그들에게 경고할지니라\"(겔 33)", options:["추수꾼","파수꾼","일꾼","심부름꾼"], answer:1},
  {id:"eze-063", book:"에스겔", chapter:33, type:"multiple", question:"다음 ( ) 안에 들어갈 인물은 누구입니까?", body:"\"( )은/는 오직 한 사람이라도 이 땅을 기업으로 얻었나니 우리가 많은즉 더욱 이 땅을 우리에게 기업으로 주신 것이 되느니라\"(겔 33)", options:["노아","아브라함","모세","다윗"], answer:1},
  {id:"eze-064", book:"에스겔", chapter:33, type:"short", question:"하나님의 심판 대상이 되는 것으로, (㉮), (㉯), (㉰)에 들어갈 표현은 무엇입니까?", body:"\"㉮는 칼에 엎드러지게 하고 ㉯는 들짐승에게 넘겨 먹히게 하고 ㉰는 전염병에 죽게 하리라\"(겔 33)", answer:"㉮ 황무지에 있는 자, ㉯ 들에 있는 자, ㉰ 산성과 굴에 있는 자"},
  {id:"eze-065", book:"에스겔", chapter:34, type:"fill", question:"다음 ( ) 안에 공통으로 들어갈 단어는 무엇입니까?", body:"\"자기만 먹는 이스라엘 ( )들은 화 있을진저 ( )이 양 떼를 먹이는 것이 마땅하지 아니하냐\"(겔 34)", answer:"목자"},
  {id:"eze-066", book:"에스겔", chapter:34, type:"short", question:"다음 ( ) 안에 들어갈 표현 중 틀린 것을 모두 고르면? (① 강하게 아니하며 ② 고치지 아니하며 ③ 싸매 주지 아니하며 ④ 자유롭게 하지 아니하며 ⑤ 구하지 아니하고 ⑥ 다스렸도다)", body:"\"너희가 그 연약한 자를 ... 병든 자를 ... 상한 자를 ... 쫓기는 자를 ... 잃어버린 자를 ... 다만 포악으로 그것들을 ...\"(겔 34)", answer:"④, ⑤ (본문은 '돌아오게 하지 아니하며', '찾지 아니하고')"},
  {id:"eze-067", book:"에스겔", chapter:34, type:"multiple", question:"다음 ( ) 안에 들어갈 인물은 누구입니까?", body:"\"내가 한 목자를 그들 위에 세워 먹이게 하리니 그는 내 종 ( )이라\"(겔 34)", options:["노아","아브라함","모세","다윗"], answer:3},
  {id:"eze-068", book:"에스겔", chapter:35, type:"multiple", question:"하나님의 심판이 될 ( ) 안에 들어갈 산 이름은 무엇입니까?", body:"\"( )아 내가 너를 대적하여 내 손을 네 위에 펴서 너를 황무지와 공포의 대상이 되게 할지라\"(겔 35)", options:["시내 산","세일 산","갈멜 산","모리아 산"], answer:1},
  {id:"eze-069", book:"에스겔", chapter:35, type:"multiple", question:"다음 본문에서 ( ) 안에 들어갈 나라의 이름은 무엇입니까?", body:"\"세일 산아 너와 ( ) 온 땅이 황폐하리니 내가 여호와인 줄을 무리가 알리라\"(겔 35)", options:["에돔","모압","암몬","아람"], answer:0},
  {id:"eze-070", book:"에스겔", chapter:36, type:"multiple", question:"다음 ( ) 안에 공통으로 들어갈 단어는 무엇입니까?", body:"\"여러 나라 가운데에서 더럽혀진 ( ) 곧 너희가 그들 가운데에서 더럽힌 나의 ( )을/를 내가 거룩하게 할지라\"(겔 36)", options:["명예","위엄","이름","권위"], answer:2},
  {id:"eze-071", book:"에스겔", chapter:37, type:"short", question:"하나님은 에스겔에게 마른 뼈가 살아나는 환상을 통해 이스라엘의 회복을 보여주셨습니다. (㉮), (㉯), (㉰), (㉱)에 들어갈 단어를 순서대로 쓰십시오.", body:"\"너희 위에 ㉮을/를 두고 ㉯을/를 입히고 ㉰으로 덮고 너희 속에 ㉱을/를 넣으리니 너희가 살아나리라\"(겔 37)", answer:"㉮ 힘줄, ㉯ 살, ㉰ 가죽, ㉱ 생기"},
  {id:"eze-072", book:"에스겔", chapter:37, type:"short", question:"하나님은 온전한 12지파의 회복을 선포하셨습니다. (㉮), (㉯), (㉰), (㉱)에 들어갈 단어는 무엇입니까?", body:"\"막대기 하나를 가져 그 위에 ㉮과/와 그 짝 ㉯ 자손이라 쓰고 또 다른 막대기 위에 ㉰과/와 그 짝 ㉱ 온 족속이라 쓰고\"(겔 37)", answer:"㉮ 유다, ㉯ 이스라엘, ㉰ 요셉(에브라임), ㉱ 이스라엘"},
  {id:"eze-073", book:"에스겔", chapter:37, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"내가 그들과 ( )의 언약을 세워 영원한 언약이 되게 하고 ... 내 성소를 그 가운데에 세워서 영원히 이르게 하리니\"(겔 37)", options:["화평","생명","소금","영생"], answer:0},
  {id:"eze-074", book:"에스겔", chapter:38, type:"multiple", question:"이스라엘에 대한 하나님의 심판 도구로 사용된 ( ) 안에 들어갈 나라 이름은 무엇입니까?", body:"\"그 날에 ( )이/가 이스라엘 땅을 치러 오면 내 노여움이 내 얼굴에 나타나리라\"(겔 38)", options:["고멜","스바","드단","곡"], answer:3},
  {id:"eze-075", book:"에스겔", chapter:39, type:"multiple", question:"다음 ( ) 안에 공통으로 들어갈 표현은 무엇입니까?", body:"\"내가 내 ( )을 내 백성 이스라엘 가운데에 알게 하여 다시는 내 ( )을 더럽히지 아니하게 하리니\"(겔 39)", options:["거룩한 이름","위대한 권능","존귀한 위엄","광대하심의 영광"], answer:0},
  {id:"eze-076", book:"에스겔", chapter:39, type:"multiple", question:"하나님은 심판 도구로 사용하신 '곡'을 다시 심판하셨습니다. ( ) 안에 공통으로 들어갈 숫자는 무엇입니까?", body:"\"이스라엘 족속이 ( ) 달 동안 그들을 매장하여 그 땅을 정결하게 할 것이라\"(겔 39)", options:["다섯","여섯","일곱","여덟"], answer:2},
  {id:"eze-077", book:"에스겔", chapter:39, type:"fill", question:"하나님이 '곡'의 패전을 비유적으로 표현한 것으로, ( ) 안에 공통으로 들어갈 단어는 무엇입니까?", body:"\"너희를 위한 나의 ( ) 곧 이스라엘 산 위에 예비한 큰 ( )로 너희는 사방에서 모여 살을 먹으며 피를 마실지니라\"(겔 39)", answer:"잔치"},
  {id:"eze-078", book:"에스겔", chapter:41, type:"short", question:"하나님이 에스겔에게 보이신, 회복될 예루살렘 성전 벽에 새겨진 나무는 무엇입니까?(겔 40~41)", answer:"종려나무"},
  {id:"eze-079", book:"에스겔", chapter:41, type:"multiple", question:"재건되는 예루살렘 성전의 그룹의 두 얼굴은 각각 무엇이었습니까?", body:"\"하나는 ( )의 얼굴이며 이쪽 종려나무를 향하였고 하나는 ( )의 얼굴이며 저쪽 종려나무를 향하였으며\"(겔 41)", options:["사람 - 사자","사람 - 독수리","사자 - 독수리","곰 - 사람"], answer:0},
  {id:"eze-080", book:"에스겔", chapter:42, type:"short", question:"에스겔이 본 새 예루살렘 성전의 '제사 음식을 위한 거룩한 방'에서 지성물을 먹는 사람들은 누구입니까?", body:"\"좌우 골방 ... 거룩한 방이라 여호와를 가까이 하는 ( )들이 지성물을 거기에서 먹을 것이며\"(겔 42)", answer:"제사장"},
  {id:"eze-081", book:"에스겔", chapter:43, type:"multiple", question:"예루살렘의 회복과 함께, 떠났던 하나님의 영광이 어디를 통해 다시 성전으로 들어갔습니까?", body:"\"여호와의 영광이 ( )을 통하여 성전으로 들어가고\"(겔 43)", options:["동문","서문","남문","북문"], answer:0},
  {id:"eze-082", book:"에스겔", chapter:43, type:"fill", question:"번제단을 측량할 때 사용하는 '한 자의 길이'에 관한 본문입니다. ( ) 안에 순서대로 들어갈 단어는 각각 무엇입니까?", body:"\"제단의 크기는 이러하니라 한 자는 ( )에서부터 ( )에 이르고 한 ( ) 넓이가 더한 것이라\"(겔 43)", answer:"팔꿈치 / 손가락 / 손바닥"},
  {id:"eze-083", book:"에스겔", chapter:43, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"제사장이 그 위에 ( )를 뿌려 나 여호와의 번제로 드릴 것이며\"(겔 43)", options:["향유","황금","소금","유향"], answer:2},
  {id:"eze-084", book:"에스겔", chapter:44, type:"multiple", question:"이스라엘이 그릇 행할 때에도 성소의 직분을 지켜 제사장 직무를 수행할 수 있었던 ( ) 안에 들어갈 인물은 누구입니까?", body:"\"이스라엘 족속이 그릇 행하여 나를 떠날 때에 ( )의 자손 레위 사람 제사장들은 내 성소의 직분을 지켰은즉\"(겔 44)", options:["아론","모세","사독","비느하스"], answer:2},
  {id:"eze-085", book:"에스겔", chapter:44, type:"multiple", question:"제사장이 성소에서 수종들기 위해 들어갈 때 봉헌해야 하는 ( ) 안에 들어갈 제의 종류는 무엇입니까?", body:"\"성소에서 수종들기 위해 안뜰과 성소에 들어갈 때에는 ( )를 드릴지니라\"(겔 44)", options:["속죄제","화목제","번제","소제"], answer:0},
  {id:"eze-086", book:"에스겔", chapter:45, type:"short", question:"성전 주변의 '거룩한 구역'은 세 부류의 직분자를 위해 구별된 장소입니다. (㉮), (㉯), (㉰)에 들어갈 직분자들은 누구입니까?", body:"\"성소에서 수종드는 ㉮ ... 성소에서 수종드는 ㉯ ... ㉰에게 돌릴지니라\"(겔 45)", answer:"㉮ 제사장들, ㉯ 레위 사람, ㉰ 왕"},
  {id:"eze-087", book:"에스겔", chapter:45, type:"multiple", question:"다음 ( ) 안에 들어갈 이스라엘의 대표적인 절기는 무엇입니까?", body:"\"첫째 달 열나흗날에는 ( )을 칠 일 동안 명절로 지키며 누룩 없는 떡을 먹을 것이라\"(겔 45)", options:["유월절","무교절","칠칠절","초막절"], answer:0},
  {id:"eze-088", book:"에스겔", chapter:46, type:"fill", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"안뜰 동쪽을 향한 ( )은 일하는 엿새 동안에는 닫되 ( )에는 열며 초하루에도 열고\"(겔 46)", answer:"문 / 안식일"},
  {id:"eze-089", book:"에스겔", chapter:46, type:"multiple", question:"군주가 새 예루살렘 성전에서 아침마다 봉헌해야 하는 예물에 해당하지 않는 것은 무엇입니까?(겔 46)", options:["일 년 되고 흠 없는 어린 양 한 마리","밀가루 육분의 일 에바","일 년 되고 흠 없는 수송아지 한 마리","기름 삼 분의 일 힌"], answer:2},
  {id:"eze-090", book:"에스겔", chapter:46, type:"short", question:"다음 ( ) 안에 들어갈 절기(제도)의 이름은 무엇입니까?", body:"\"군주가 만일 그 기업을 한 종에게 선물로 준즉 ( )까지 이르고 그 후에는 군주에게로 돌아갈 것이니\"(겔 46)", answer:"자유의 해(희년)"},
  {id:"eze-091", book:"에스겔", chapter:47, type:"multiple", question:"성경 본문 속 '강물'은 어디에서 흘러 내려오는 물입니까?", body:"\"이 강물이 이르는 곳마다 ... 번성하는 모든 생물이 살고 ... 이 강이 이르는 각처에 모든 것이 살 것이며\"(겔 47)", options:["에덴","성전","기혼 샘","마라의 샘"], answer:1},
  {id:"eze-092", book:"에스겔", chapter:48, type:"multiple", question:"다음 ( ) 안에 들어갈, '여호와께서 거기에 계시다'라는 뜻을 지닌 예루살렘 성읍의 다른 이름은 무엇입니까?", body:"\"그 날 후로부터 그 성읍의 이름을 ( )라 하리라\"(겔 48)", options:["여호와닛시","여호와삼마","여호와이레","여호와라파"], answer:1},
  {id:"dan-001", book:"다니엘", chapter:1, type:"multiple", question:"다니엘의 활동 시기와 무관한 이방 왕은 누구입니까?", options:["느부갓네살","벨사살","다리오","고레스","아하수에로","아닥사스다"], answer:4},
  {id:"dan-002", book:"다니엘", chapter:1, type:"multiple", question:"다니엘은 오랫동안 왕궁에서 일했습니다. 그가 활동했던 나라가 아닌 곳은 어디입니까?", options:["바벨론","메대","바사","헬라"], answer:3},
  {id:"dan-003", book:"다니엘", chapter:1, type:"multiple", question:"다음 ( ) 안에 들어갈, 아스부나스에게 명령을 내린 바벨론 궁정 내 관직명은 무엇입니까?", body:"\"왕이 ( ) 아스부나스에게 말하여 이스라엘 자손 중에서 왕족과 귀족 몇 사람 곧 흠이 없고 용모가 아름다우며 모든 지혜를 통달하며 지식이 구비하며 학문에 익숙하여 왕궁에 설 만한 소년을 데려오게 하였고 그들에게 갈대아 사람의 학문과 언어를 가르치게 하였고\"(단 1)", options:["술 맡은 관원장","떡 굽는 관원장","환관장","근위대장"], answer:2},
  {id:"dan-004", book:"다니엘", chapter:1, type:"multiple", question:"아스부나스는 지혜롭고 용모가 아름다운 유다 출신의 소년들을 바벨론 왕 궁에 세우기 위해 몇 년을 가르쳤습니까?", body:"\"또 왕이 지정하여 그들에게 왕의 음식과 그가 마시는 포도주에서 날마다 줄 것을 주어 ( )년을 기르게 하였으니 그 후에 그들로 왕 앞에 서게 할 것이더라\"(단 1)", options:["이","삼","사","오"], answer:1},
  {id:"dan-005", book:"다니엘", chapter:1, type:"fill", question:"아스부나스는 다니엘과 그의 세 친구에게 새로운 이름을 부여했습니다. 다음 ( ) 안에 들어갈 다니엘의 새 이름은 무엇입니까?", body:"\"다니엘은 ( )이라 하고 하나냐는 사드락이라 하고 미사엘은 메삭이라 하고 아사랴는 아벳느고라 하였더라\"(단 1)", answer:"벨드사살"},
  {id:"dan-006", book:"다니엘", chapter:1, type:"multiple", question:"다음 ( ) 안에 들어갈 숫자는 얼마입니까?", body:"\"청하오니 당신의 종들을 ( )동안 시험하사 채식을 주어 먹게 하고 물을 주어 마시게 한 후에\"(단 1)", options:["닷새","열흘","보름","스무날"], answer:1},
  {id:"dan-007", book:"다니엘", chapter:2, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"갈대아 술사들이 ( )말로 왕에게 말하되 왕이여 만수무강 하옵소서 왕께서 그 꿈을 종들에게 이르시면 우리가 해석하여 드리겠나이다 하는지라\"(단 2)", options:["바벨론","헬라","아람","메대"], answer:2},
  {id:"dan-008", book:"다니엘", chapter:2, type:"multiple", question:"느부갓네살이 꾼 꿈의 내용은 다음과 같습니다. 그 중에서 '그 발은 얼마는 쇠요 얼마는 진흙'이라는 말은 무엇을 의미합니까?", body:"\"그 우상의 머리는 순금이요 가슴과 두 팔은 은이요 배와 넓적다리는 놋이요 그 종아리는 쇠요 그 발은 얼마는 쇠요 얼마는 진흙이니\"(단 2)", options:["나라가 흥할 것이다","나라가 쇠할 것이다","나라가 나뉘질 것이다","나라가 합쳐질 것이다"], answer:2},
  {id:"dan-009", book:"다니엘", chapter:3, type:"multiple", question:"느부갓네살이 다니엘의 세 친구를 풀무불에 던졌을 때, 세 친구와 함께 풀 가운데로 다니는 자는 어떤 모양이었습니까?", body:"\"왕이 또 말하여 이르되 내가 보니 결박되지 아니한 네 사람이 불 가운데로 다니는데 상하지도 아니하였고 그 넷째의 모양은 ( )와 같도다 하고\"(단 3)", options:["사자","천사","신들의 아들","스랍"], answer:2},
  {id:"dan-010", book:"다니엘", chapter:3, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"그러므로 내가 이제 명령을 내리노니 각 백성과 각 나라와 각 언어를 말하는 자가 모두 사드락과 메삭과 아벳느고의 하나님께 경솔히 말하거든 그 몸을 쪼개고 그 집을 ( )로/으로 삼을지니 이는 이같이 사람을 구원할 다른 신이 없음이니라 하더라\"(단 3)", options:["화장터","거름터","전쟁터","타작마당","무덤"], answer:1},
  {id:"dan-011", book:"다니엘", chapter:4, type:"multiple", question:"다음 성경 본문과 연관지어서 느부갓네살 왕이 다니엘에게 수여한 관직명은 무엇입니까?", body:"\"그 후에 다니엘이 내 앞에 들어왔으니 그는 내 신의 이름을 따라 벨드사살이라 이름한 자요 그의 안에는 거룩한 신들의 영이 있는 자라 내가 그에게 꿈을 말하여 이르되 ( ) 벨드사살아 네 안에는 거룩한 신들의 영이 있은즉 어떤 은밀한 것이라도 네게는 어려울 것이 없는 줄을 내가 아노니 내 꿈에 본 환상의 해석을 내게 말하라\"(단 4)", options:["박수장","술객장","재판장","환관장"], answer:0},
  {id:"dan-012", book:"다니엘", chapter:4, type:"fill", question:"다음은 느부갓네살이 꾼 두 번째 꿈의 내용입니다. 중앙에 한 나무가 의미하는 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"왕이여 이 나무는 곧 ( )이시라 이는 ( )가 자라서 견고하여지고 그 높이는 하늘에 닿으며 그 권세는 땅 끝까지 미침이니이다\"(단 4)", answer:"왕"},
  {id:"dan-013", book:"다니엘", chapter:4, type:"fill", question:"다니엘이 느부갓네살 왕의 꿈을 해석한 후 그는 하나님을 ( )으로 칭하며 찬양하였습니다. 다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"그러므로 지금 나 느부갓네살은 ( )을 찬양하며 칭송하며 경배하노니 그의 일이 다 진실하고 그의 행하심이 의로우시므로 교만하게 행하는 자를 그가 능히 낮추심이라\"(단 4)", answer:"하늘의 왕"},
  {id:"dan-014", book:"다니엘", chapter:5, type:"fill", question:"다음과 같은 악행을 저지른 왕은 누구입니까?", body:"\"( )이 술을 마실 때에 명하여 그의 부친 느부갓네살이 예루살렘 성전에서 탈취하여 온 금, 은 그릇을 가져오라고 말하였으니 이는 왕과 귀족들과 왕후들과 후궁들이 다 그것으로 마시려 함이었더라\"(단 5)", answer:"벨사살"},
  {id:"dan-015", book:"다니엘", chapter:5, type:"multiple", question:"벨사살 왕이 술을 마실 때 사람의 손가락이 나타나 왕궁 촛대 맞은편 석회벽에 '메네 메네 데겔 우바르신'이라는 글을 썼습니다. 그 중 '데겔'의 뜻은 무엇입니까?", options:["저울에 달아보다","세어 보다","합산하다","나누다"], answer:0},
  {id:"dan-016", book:"다니엘", chapter:5, type:"multiple", question:"다니엘이 석회벽에 쓰인 글을 해석한 날 벨사살 왕은 죽음을 맞이하고 다음 ( ) 안에 공통으로 들어갈 왕이 대신 통치하게 됩니다. 그의 이름은 무엇입니까?", body:"\"그 날 밤에 갈대아 왕 벨사살이 죽임을 당하였고 메대 사람 ( )가 나라를 얻었는데 그 때에 ( )는 육십이 세였더라\"(단 5)", options:["아하수에로","느부갓네살","다리오","고레스"], answer:2},
  {id:"dan-017", book:"다니엘", chapter:6, type:"multiple", question:"다음 성경 본문은 다니엘을 시기하던 총리들과 고관들이 왕에게 고발한 내용입니다. 다음 ( ) 안에 들어갈 숫자는 얼마입니까?", body:"\"이제부터 ( ) 동안에 누구든지 왕 외에 어떤 신에게나 사람에게 무엇을 구하면 사자 굴에 던져 넣기로 한 것이니이다\"(단 6)", options:["십일","이십일","삼십일","사십일"], answer:2},
  {id:"dan-018", book:"다니엘", chapter:7, type:"multiple", question:"바벨론 벨사살 왕 원년에 다니엘이 꾼 네 짐승의 환상에 포함되지 않는 짐승은 무엇입니까?", options:["독수리의 날개를 가진 사자","세 갈빗대를 물고 있는 곰","등에 새의 날개 넷이 있고 머리 넷인 표범","머리에 뿔을 물고 네 개의 날개가 달린 곰"], answer:3},
  {id:"dan-019", book:"다니엘", chapter:7, type:"multiple", question:"다음 ( ) 안에 들어갈 표현은 무엇입니까?", body:"\"내가 또 밤 환상 중에 보니 ( )이 하늘 구름을 타고 와서 옛적부터 항상 계신 이에게 나아가 그 앞으로 인도되매\"(단 7)", options:["인자 같은 이","천사 같은 이","그룹 같은 이","짐승 같은 이"], answer:0},
  {id:"dan-020", book:"다니엘", chapter:8, type:"fill", question:"다음 ( ) 안에 들어갈 나라의 이름은 무엇입니까?", body:"\"네가 본 바 두 뿔 가진 숫양은 곧 메대와 바사 왕들이요 털이 많은 숫염소는 곧 ( ) 왕이요 그의 두 눈 사이에 있는 큰 뿔은 곧 그 첫째 왕이라\"(단 8)", answer:"헬라"},
  {id:"dan-021", book:"다니엘", chapter:9, type:"multiple", question:"다음 ( ) 안에 들어갈 선지자는 누구입니까?", body:"\"곧 그 통치 원년에 나 다니엘이 책을 통하여 여호와께서 말씀으로 선지자 ( )에게 알려 주신 그 연수를 깨달았나니 곧 예루살렘의 황폐함이 칠십 년 만에 그치리라 하신 것이니라\"(단 9)", options:["이사야","예레미야","에스겔","스가랴"], answer:1},
  {id:"dan-022", book:"다니엘", chapter:9, type:"fill", question:"다음 ( ) 안에 공통으로 들어갈 단어는 무엇입니까?", body:"\"예루살렘을 중건하라는 영이 날 때부터 ( ) 받은 자 곧 왕에게 일어나기까지 일곱 이레와 예순두 이레가 지날 것이요 … 예순두 이레 후에 ( )을 받은 자가 끊어져 없어질 것이며\"(단 9)", answer:"기름 부음"},
  {id:"dan-023", book:"다니엘", chapter:10, type:"fill", question:"다음 ( ) 안에 들어갈 이름은 무엇입니까?", body:"\"그런데 바사 왕국의 군주가 이십일 일 동안 나를 막았으므로 내가 거기 바사 왕국의 왕들과 함께 머물러 있더니 가장 높은 군주 중 하나인 ( )이 와서 나를 도와 주므로\"(단 10)", answer:"미가엘"},
  {id:"dan-024", book:"다니엘", chapter:10, type:"multiple", question:"다니엘은 바사 왕 고레스 통치 삼 년에 큰 전쟁이 일어날 것이라는 환상을 본 후에 며칠 동안 슬퍼하며 멀리 했습니까?", body:"\"그 때에 나 다니엘이 ( )동안을 슬퍼하며 ( )이 다 차기까지 좋은 떡을 먹지 아니하며 고기와 포도주를 입에 대지 아니하며 또 기름을 바르지 아니하니라\"(단 10)", options:["이레","두 이레","세 이레","네 이레"], answer:2},
  {id:"dan-025", book:"다니엘", chapter:10, type:"multiple", question:"다니엘이 환상을 본 장소로, 헬라어로는 '티그리스 강'을 뜻하는 ( ) 안에 들어갈 강 이름은 무엇입니까?", body:"\"첫째 달 이십사일에 내가 ( )라 하는 큰 강 가에 있었는데\"(단 10)", options:["비손","기혼","힛데겔","유브라데"], answer:2},
  {id:"dan-026", book:"다니엘", chapter:11, type:"multiple", question:"다니엘이 본 마지막 때의 내용 가운데 남방 왕과 북방 왕의 싸움 중 최후에 북방 왕이 여러 나라를 멸망시킬 때 그 왕의 손에서 벗어난 세 나라가 아닌 곳은 어디입니까?", body:"\"그가 또 영화로운 땅에 들어갈 것이요 많은 나라를 패망하게 할 것이나 오직 ( )과 ( )과 ( ) 자손의 지도자들은 그의 손에서 벗어나리라\"(단 11)", options:["에돔","아람","모압","암몬"], answer:1},
  {id:"dan-027", book:"다니엘", chapter:12, type:"multiple", question:"다음 ( ) 안에 들어갈 표현은 무엇입니까?", body:"\"( )는 궁창의 빛과 같이 빛날 것이요 많은 사람을 옳은 데로 돌아오게 한 자는 별과 같이 영원토록 빛나리라\"(단 12)", options:["신실한 자","지혜 있는 자","권세 있는 자","경배하는 자"], answer:1},
  {id:"hos-001", book:"호세아", chapter:1, type:"short", question:"호세아 선지자가 활동했던 주전 8세기에 북 왕국 이스라엘을 통치했던 왕은 누구입니까? (호 1)", answer:"여로보암 (2세)"},
  {id:"hos-002", book:"호세아", chapter:1, type:"multiple", question:"다음 ( ) 안에 들어갈 왕의 이름은 무엇입니까?", body:"\"여호와께서 호세아에게 이르시되 그의 이름을 이스르엘이라 하라 조금 후에 내가 이스르엘의 피를 ( )의 집에 갚으며 이스라엘 족속의 나라를 폐할 것임이니라\"(호 1)", options:["오므리","아합","예후","여로보암"], answer:2},
  {id:"hos-003", book:"호세아", chapter:1, type:"multiple", question:"호세아가 고멜에게서 낳은 셋째 자녀 '로암미'의 뜻은 무엇입니까? (호 1)", options:["너희는 내 백성이 아니다","내가 다시는 이스라엘 족속을 긍휼히 여기지 않겠다","이스라엘 족속의 나라를 폐할 것이다","여호와께 구원받지 않을 것이다"], answer:0},
  {id:"hos-004", book:"호세아", chapter:2, type:"fill", question:"다음 ( ) 안에 들어갈 이름은 이스라엘이 다시 회복될 것을 상징합니다. 이 이름은 무엇입니까?", body:"\"너희 형제에게는 ( )라 하고 너희 자매에게는 ( )라 하라\"(호 2)", answer:"암미 / 루하마"},
  {id:"hos-005", book:"호세아", chapter:2, type:"multiple", question:"호세아서에서 언급되는 대표적인 우상신으로, ( ) 안에 들어갈 이방신의 이름은 무엇입니까?", body:"\"곡식과 새 포도주와 기름은 내가 그에게 준 것이요 그들이 ( )을/를 위하여 쓴 은과 금도 내가 그에게 더하여 준 것이거늘 그가 알지 못하도다\"(호 2)", options:["몰렉","바알","아세라","다곤"], answer:1},
  {id:"hos-006", book:"호세아", chapter:2, type:"fill", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"거기서 비로소 그의 포도원을 그에게 주고 ( ) 골짜기로 소망의 문을 삼아 주리니 그가 거기서 응대하기를 어렸을 때와 애굽 땅에서 올라오던 날과 같이 하리라\"(호 2)", answer:"아골"},
  {id:"hos-007", book:"호세아", chapter:2, type:"fill", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"여호와께서 이르시되 그 날에 네가 나를 내 ( )이라 일컫고 다시는 내 ( )이라 일컫지 아니하리라\"(호 2)", answer:"남편 / 바알"},
  {id:"hos-008", book:"호세아", chapter:3, type:"short", question:"다음 ( ) 안에 들어갈 단어를 올바른 순서로 나열하십시오. [보기] ㉠제사장 ㉡선지자 ㉢왕 ㉣지도자 ㉤재판관 ㉥사사 ㉦묵시 ㉧에봇 ㉨환상 ㉩드라빔", body:"\"이스라엘 자손들이 많은 날 동안 ( )도 없고 ( )도 없고 제사도 없고 주상도 없고 ( )도 없고 ( )도 없이 지내다가\"(호 3)", answer:"왕 - 지도자 - 에봇 - 드라빔 (㉢-㉣-㉧-㉩)"},
  {id:"hos-009", book:"호세아", chapter:3, type:"multiple", question:"다음 ( ) 안에 들어갈 왕은 누구입니까?", body:"\"그 후에 이스라엘 자손이 돌아와서 그들의 하나님 여호와와 그들의 왕 ( )을/를 찾고 마지막 날에는 여호와를 경외하므로 여호와와 그의 은총으로 나아가리라\"(호 3)", options:["사울","다윗","솔로몬","히스기야"], answer:1},
  {id:"hos-010", book:"호세아", chapter:4, type:"multiple", question:"다음 ( ) 안에 공통으로 들어갈 단어는 무엇입니까?", body:"\"이 땅에는 진실도 없고 인애도 없고 하나님을 아는 ( )도 없고 ... 내 백성이 ( )이 없으므로 망하는도다 네가 ( )을 버렸으니 나도 너를 버려 내 제사장이 되지 못하게 할 것이요\"(호 4)", options:["명철","지식","규범","앎"], answer:1},
  {id:"hos-011", book:"호세아", chapter:4, type:"multiple", question:"호세아 선지자를 통해 하나님은 이방 예배를 책망하셨습니다. 다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"내 백성이 ( )에게 묻고 그 ( )은/는 그들에게 고하나니 이는 그들이 음란한 마음에 미혹되어 하나님을 버리고 음행하였음이니라\"(호 4)", options:["나무 · 막대기","태양 · 그림자","은점 · 점괘","점쟁이 · 별들"], answer:0},
  {id:"hos-012", book:"호세아", chapter:4, type:"multiple", question:"다음 ( ) 안에 들어갈 지명은 무엇입니까?", body:"\"이스라엘아 너는 음행하여도 유다는 죄를 범하지 못하게 할 것이라 너희는 ( )로/으로 가지 말며 ( )로/으로 올라가지 말며 여호와의 사심을 두고 맹세하지 말지어다\"(호 4)", options:["사마리아 · 예루살렘","실로 · 마하나임","길갈 · 벧아웬","단 · 브엘세바"], answer:2},
  {id:"hos-013", book:"호세아", chapter:5, type:"multiple", question:"호세아 선지자가 선포한 대표적인 하나님의 심판 대상으로 ( ) 안에 들어갈 두 단어는 무엇입니까?", body:"\"( )아 이를 들으라 이스라엘 족속들아 깨달으라 ( )아 귀를 기울이라 너희에게 심판이 있나니 너희가 미스바에 대하여는 올무가 되며 다볼 위에 친 그물이 됨이로다\"(호 5)", options:["선지자들 · 재판관들","제사장들 · 왕족들","제사장들 · 선지자들","장로들 · 통치자들"], answer:1},
  {id:"hos-014", book:"호세아", chapter:5, type:"fill", question:"바알과 이스라엘 백성의 관계를 상징적으로 말하는 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"그들이 여호와께 정조를 지키지 아니하고 ( )를 낳았으니 그러므로 새 달이 그들과 그 기업을 함께 삼키리로다\"(호 5)", answer:"사생아"},
  {id:"hos-015", book:"호세아", chapter:5, type:"multiple", question:"북 왕국 이스라엘을 대표하는 ( ) 안에 들어갈 지파의 이름은 무엇입니까?", body:"\"( )이 견책받는 날에 황폐할 것이니 내가 이스라엘 중에 반드시 있을 일을 보였노라\"(호 5)", options:["요셉","에브라임","베냐민","야곱"], answer:1},
  {id:"hos-016", book:"호세아", chapter:6, type:"short", question:"다음 ( ) 안에 들어갈 단어를 각각 고르십시오. (다답) [보기] ①안개 ②햇살 ③구름 ④이슬", body:"\"에브라임아 내가 네게 어떻게 하랴 유다야 내가 네게 어떻게 하랴 너희의 인애가 아침 ( )나/이나 같고 쉬 없어지는 ( ) 같도다\"(호 6)", answer:"구름 / 이슬 (③·④)"},
  {id:"hos-017", book:"호세아", chapter:6, type:"fill", question:"다음 ( ) 안에 들어갈 단어는 누구입니까?", body:"\"그들은 ( )처럼 언약을 어기고 거기에서 나를 반역하였느니라\"(호 6)", answer:"아담"},
  {id:"hos-018", book:"호세아", chapter:7, type:"multiple", question:"주변 국가의 도움을 구하는 어리석은 이스라엘을 비판할 때 ( ) 안에 들어갈 동물은 무엇입니까?", body:"\"에브라임은 어리석은 ( ) 같이 지혜가 없어서 애굽을 향하여 부르짖고 앗수르로 가는도다\"(호 7)", options:["뱀","비둘기","사자","나귀"], answer:1},
  {id:"hos-019", book:"호세아", chapter:8, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"나팔을 네 입에 댈지어다 원수가 독수리처럼 여호와의 집에 덮치리니 이는 그들이 내 ( )을/를 어기며 내 율법을 범함이로다\"(호 8)", options:["언약","규례","교훈","지식"], answer:0},
  {id:"hos-020", book:"호세아", chapter:8, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"이것은 이스라엘에서 나고 ( )이/가 만든 것이라 참 신이 아니니 사마리아의 송아지가 산산조각이 나리라\"(호 8)", options:["토기장이","장인","대장장이","목수"], answer:1},
  {id:"hos-021", book:"호세아", chapter:9, type:"short", question:"다음 ( ) 안에 들어갈 두 단어는 각각 무엇입니까? (다답) [보기] ①애굽 ②아람 ③바벨론 ④앗수르", body:"\"그들은 여호와의 땅에 거주하지 못하며 에브라임은 ( )로/으로 다시 가고 ( )에서 더러운 것을 먹을 것이라\"(호 9)", answer:"애굽 / 앗수르 (①·④)"},
  {id:"hos-022", book:"호세아", chapter:9, type:"short", question:"다음 ( ) 안에 들어갈 단어는 각각 무엇입니까? (다답) [보기] ①찔레 ②엉겅퀴 ③가시덤불 ④돌무화과 ⑤우슬초 ⑥가라지", body:"\"보라 그들이 멸망을 피하여 갈지라도 애굽이 그들을 모으고 놉이 그들을 장사하리니 그들의 은은 귀한 것이나 ( )이/가 덮을 것이요 그들의 장막 안에는 ( )이/가 퍼지리라\"(호 9)", answer:"찔레 / 가시덤불 (①·③)"},
  {id:"hos-023", book:"호세아", chapter:9, type:"fill", question:"지난날 이스라엘 백성이 하나님의 임재와 도우심을 경험한 상징적인 장소로, ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"옛적에 내가 이스라엘을 만나기를 ( )에서 포도를 만남 같이 하였으며 너희 조상들을 보기를 무화과나무에서 처음 맺힌 첫 열매를 봄 같이 하였거늘\"(호 9)", answer:"광야"},
  {id:"hos-024", book:"호세아", chapter:9, type:"multiple", question:"이스라엘 백성이 광야 시대 모압 여자들과 음행한 사건을 상기시키는 ( ) 안에 들어갈 지명은 무엇입니까?", body:"\"... 그들이 ( )에 가서 부끄러운 우상에게 몸을 드림으로 저희가 사랑하는 우상 같이 가증하여졌도다\"(호 9)", options:["싯딤","엘림","마라","바알브올"], answer:3},
  {id:"hos-025", book:"호세아", chapter:10, type:"multiple", question:"사사 시대 베냐민 지파와 다른 지파 사이의 비극적인 살육(삿 19~21)을 상기시키는 ( ) 안에 들어갈 지명은 무엇입니까?", body:"\"이스라엘아 네가 ( ) 시대로부터 범죄하더니 지금까지 죄를 짓는구나 그러니 범죄한 자손들에 대한 전쟁이 어찌 ( )에서 일어나지 않으랴\"(호 10)", options:["길갈","여리고","기브아","실로"], answer:2},
  {id:"hos-026", book:"호세아", chapter:10, type:"multiple", question:"다음 ( ) 안에 공통으로 들어갈 단어는 무엇입니까?", body:"\"에브라임은 마치 길들인 암소 같아서 곡식 밟기를 좋아하나 내가 그의 아름다운 목에 ( )을/를 메우고 ... 내가 사람의 줄 곧 사랑의 줄로 그들을 이끌었고 그들에 대하여 그 목에서 ( )을/를 벗기는 자 같이 되었으며\"(호 10~11)", options:["사슬","족쇄","멍에","칼"], answer:2},
  {id:"hos-027", book:"호세아", chapter:12, type:"multiple", question:"야곱이 하나님을 만났던 장소로 ( ) 안에 들어갈 지명은 어디입니까?", body:"\"야곱은 모태에서 그의 형의 발뒤꿈치를 잡았고 또 힘으로는 하나님과 겨루되 천사와 겨루어 이기고 울며 그에게 간구하였으며 하나님은 ( )에서 그를 만나셨고 거기에서 우리에게 말씀하셨나니\"(호 12)", options:["벧엘","브니엘","브엘세바","헤브론"], answer:0},
  {id:"hos-028", book:"호세아", chapter:12, type:"multiple", question:"다음 ( ) 안에 공통으로 들어갈 단어는 무엇입니까?", body:"\"여호와께서는 한 ( )로/으로 이스라엘을 애굽에서 인도하여 내셨고 이스라엘이 한 ( )로/으로 보호 받았나니\"(호 12)", options:["왕","제사장","선지자","목자"], answer:2},
  {id:"hos-029", book:"호세아", chapter:13, type:"fill", question:"다음 ( ) 안에 공통으로 들어갈 단어는 무엇입니까?", body:"\"이제도 그들은 더욱 범죄하여 그 은으로 자기를 위하여 ( )을 부어 만들되 자기의 정교함을 따라 ( )을 만들었으며 그것은 다 은장색이 만든 것이거늘\"(호 13)", answer:"우상"},
  {id:"hos-030", book:"호세아", chapter:13, type:"short", question:"심판하시는 하나님을 비유한 동물을 순서대로 나열하십시오. [보기] ㉠사자 ㉡독수리 ㉢표범 ㉣곰 ㉤늑대 ㉥뱀 ㉦암사자 ㉧악어", body:"\"그러므로 내가 그들에게 ( )같이 되고 길 가에서 기다리는 ( ) 같으니라 내가 새끼 잃은 ( ) 같이 그들을 만나 그 염통 꺼풀을 찢고 거기서 ( ) 같이 그들을 삼키리라\"(호 13)", answer:"사자 - 표범 - 곰 - 암사자 (㉠-㉢-㉣-㉦)"},
  {id:"hos-031", book:"호세아", chapter:14, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"너는 말씀을 가지고 여호와께로 돌아와서 아뢰기를 모든 불의를 제거하시고 선한 바를 받으소서 우리가 수송아지를 대신하여 ( )의 열매를 주께 드리리이다\"(호 14)", options:["입술","찬양","기름","마음"], answer:0},
  {id:"hos-032", book:"호세아", chapter:14, type:"short", question:"다음 ( ) 안에 순서대로 들어갈 꽃과 나무의 이름을 나열하십시오. [보기] ㉠장미꽃 ㉡백합화 ㉢수선화 ㉣포도나무 ㉤레바논 백향목 ㉥종려나무 ㉦무화과나무", body:"\"그가 ( )같이 피겠고 ( ) 같고 뿌리가 박힐 것이라 그의 가지는 퍼지며 그의 아름다움은 ( )와/과 같고 ... 그들은 곡식 같이 풍성할 것이며 ( ) 같이 꽃이 필 것이며 그 향기는 레바논의 포도주 같이 되리라\"(호 14)", answer:"백합화 - 레바논 백향목 - 무화과나무 - 포도나무 (㉡-㉤-㉦-㉣)"},
  {id:"joe-001", book:"요엘", chapter:1, type:"multiple", question:"다음 ( ) 안에 공통으로 들어갈 대상은 누구입니까?", body:"\"소제와 전제가 여호와의 성전에서 끊어졌고 여호와께 수종드는 ( )은/는 슬퍼하도다 ... 내 하나님께 수종드는 ( )들아 너희는 와서 굵은 베를 입고 밤이 새도록 슬피 울지어다\"(욜 1)", options:["선지자","왕","제사장","재판관"], answer:2},
  {id:"joe-002", book:"요엘", chapter:1, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"너희는 ( )을 정하고 성회를 소집하여 장로들과 이 땅의 모든 주민들을 너희 하나님 여호와의 성전으로 모으고 여호와께 부르짖을지어다\"(욜 1)", options:["속죄일","금식일","안식일","축제일"], answer:1},
  {id:"joe-003", book:"요엘", chapter:2, type:"fill", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"시온에서 나팔을 불며 나의 거룩한 산에서 경고의 소리를 질러 이 땅 주민들로 다 떨게 할지니 이는 ( )이 이르게 됨이니라 이제 임박하였으니 곧 어둡고 캄캄한 날이요 짙은 구름이 덮인 날이라\"(욜 2)", answer:"여호와의 날"},
  {id:"joe-004", book:"요엘", chapter:2, type:"short", question:"다음 ( ) 안에 들어갈 표현을 순서대로 나열하십시오. [보기] ①마음을 ②노하기를 더디하시며 ③뜻을 ④옷을 ⑤자비로우시며 ⑥은혜로우시며", body:"\"너희는 ( ) 찢지 말고 ( ) 찢고 너희 하나님 여호와께로 돌아올지어다 그는 ( ) ( ) ( ) 인애가 크시사 ( ) 돌이켜 재앙을 내리지 아니하시나니\"(욜 2)", answer:"옷을 - 마음을 - 은혜로우시며 - 자비로우시며 - 노하기를 더디하시며 - 뜻을 (④-①-⑥-⑤-②-③)"},
  {id:"joe-005", book:"요엘", chapter:2, type:"short", question:"다음 ( )와 ( )에 들어갈 단어는 무엇입니까?", body:"\"시온의 자녀들아 너희는 너희 하나님 여호와로 말미암아 기뻐하며 즐거워할지어다 그가 너희를 위하여 비를 내리시되 ( )를 너희에게 적당하게 주시리니 ( )와/과 ( )가 예전과 같을 것이라\"(욜 2)", answer:"이른 비 / 늦은 비"},
  {id:"joe-006", book:"요엘", chapter:2, type:"short", question:"다음 ( ) 안에 들어갈 단어를 순서대로 나열하십시오. [보기] ①만민 ②여종 ③늙은이 ④자녀들 ⑤젊은이 ⑥남종", body:"\"그 후에 내가 내 영을 ( )에게 부어 주리니 너희 ( )이/가 장래 일을 말할 것이며 너희 ( )은/는 꿈을 꾸며 너희 ( )은/는 이상을 볼 것이며 그 때에 내가 또 내 영을 ( )와/과 ( )에게 부어 줄 것이며\"(욜 2)", answer:"만민 - 자녀들 - 늙은이 - 젊은이 - 남종 - 여종 (①-④-③-⑤-⑥-②)"},
  {id:"joe-007", book:"요엘", chapter:3, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"... 유다 자손과 예루살렘 자손들을 ( ) 족속에게 팔아서 그들의 영토에서 멀리 떠나게 하였음이니라\"(욜 3)", options:["앗수르","바벨론","바사","헬라"], answer:3},
  {id:"joe-008", book:"요엘", chapter:3, type:"short", question:"다음 ( )와 ( )에 들어갈 단어는 무엇입니까?", body:"\"내가 만국을 모아 데리고 ( ) 골짜기에 내려가서 내 백성 곧 내 기업인 이스라엘을 위하여 거기서 그들을 심판하리니 ... ( )의 골짜기에 사람이 많음이여 ( )의 골짜기에 여호와의 날이 가까움이로다\"(욜 3)", answer:"여호사밧 / 심판"},
  {id:"joe-009", book:"요엘", chapter:3, type:"fill", question:"구약에서 이스라엘의 대표적인 적으로 언급되는 ( ) 안에 들어갈 두 나라는 어디입니까?", body:"\"( )은 황무지가 되겠고 ( )은 황무한 들이 되리니 이는 그들이 유다 자손에게 포악을 행하여 무죄한 피를 그 땅에서 흘렸음이니라\"(욜 3)", answer:"애굽 / 에돔"},
  {id:"amo-001", book:"아모스", chapter:1, type:"multiple", question:"다음은 아모스 선지자가 활동했던 시대에 대한 설명입니다. ( ) 안에 들어갈 유다와 이스라엘의 왕은 누구입니까? \"유다 왕 ( )의 시대 곧 이스라엘 왕 요아스의 아들 ( )의 시대 지진 전 이년에 드고아 목자 중 아모스가 이스라엘에 대하여 이상으로 받은 말씀이라\"(암 1)", options:["요담 - 아합","아하스 - 예후","웃시야 - 여로보암","히스기야 - 므나세"], answer:2},
