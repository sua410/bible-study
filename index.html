  {id:"oba-002", book:"오바댜", chapter:1, type:"multiple", question:"다음 성경 본문은 (①), (②), (③), (④)에 들어갈 표현 중 옳지 않은 것은 무엇입니까? \"네가 멀리 섰던 날 곧 이방인이 그의 재물을 빼앗아 가며 외국인이 그의 성문에 들어가서 예루살렘을 얻기 위하여 제비 뽑던 날에 너도 그들 중 한 사람 같았느니라 네가 형제의 날 곧 그 재앙의 날에 방관할 것이 아니며 유다 자손이 패망하는 날에 기뻐할 것이 아니며 그 고난의 날에 네가 입을 크게 벌릴 것이 아니며\"(옵 1)", options:["제비 뽑던 날","재앙의 날","패망하는 날","죽음의 날"], answer:3},
  {id:"oba-003", book:"오바댜", chapter:1, type:"multiple", question:"다음 ( ) 안에 들어갈 산의 이름은 무엇입니까? \"오직 ( ) 산에서 피할 자가 있으리니 그 산이 거룩할 것이요 야곱 족속은 자기 기업을 누릴 것이며\"(옵 1)", options:["갈멜","시온","길보아","호렙"], answer:1},
  {id:"oba-004", book:"오바댜", chapter:1, type:"multiple", question:"다음 ( ) 안에 공통으로 들어갈 인물의 이름은 무엇입니까? \"야곱 족속은 불이 될 것이며 요셉 족속은 불꽃이 될 것이요 ( ) 족속은 지푸라기가 될 것이며 그들이 그들 위에 붙어서 그들을 불사를 것인즉 ( ) 족속에 남은 자가 없으리니 여호와께서 말씀하셨음이라\"(옵 1)", options:["이스마엘","야베스","가나안","에서"], answer:3},
  {id:"jon-001", book:"요나", chapter:1, type:"multiple", question:"하나님은 요나에게 명령하여 앗수르의 수도인 이곳에 구원을 선포하셨습니다. ( ) 안에 들어갈 도시는 어디입니까?", body:"\"너는 일어나 저 큰 성읍 ( )(으)로 가서 그것을 향하여 외치라 그 악독이 내 앞에 상달되었음이니라 하시니라\"(욘 1)", options:["하란","니느웨","우르","다메섹"], answer:1},
  {id:"jon-002", book:"요나", chapter:1, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"그가 대답하되 나는 ( ) 사람이요 바다와 육지를 지으신 하늘의 하나님 여호와를 경외하는 자로라 하고\"(욘 1)", options:["아람","아모리","미디안","히브리"], answer:3},
  {id:"jon-003", book:"요나", chapter:2, type:"fill", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"이르되 내가 받는 고난으로 말미암아 여호와께 불러 아뢰었더니 주께서 내게 대답하셨고 내가 ( )의 뱃속에서 부르짖었더니 주께서 내 음성을 들으셨나이다\"(욘 2)", answer:"스올"},
  {id:"jon-004", book:"요나", chapter:1, type:"fill", question:"다음 ( ) 안에 공통으로 들어갈 단어는 무엇입니까?", body:"\"그 사람들이 여호와를 크게 두려워하여 여호와께 제물을 드리고 ( )을 하였더라\"(욘 1) / \"나는 감사하는 목소리로 주께 제사를 드리며 나의 ( )을 주께 갚겠나이다 구원은 여호와께 속하였나이다 하니라\"(욘 2)", answer:"서원"},
  {id:"jon-005", book:"요나", chapter:3, type:"short", question:"니느웨는 요나가 며칠 동안 걸어야 할 만큼 큰 규모의 성읍이었습니까? (욘 3)", answer:"사흘(삼 일)"},
  {id:"jon-006", book:"요나", chapter:3, type:"multiple", question:"요나는 성읍에 들어가 곧 성읍이 무너질 것이라고 외쳤습니다. 다음 ( ) 안에 들어갈 숫자는 얼마입니까?", body:"\"요나가 그 성읍에 들어가서 하루 동안 다니며 외쳐 이르되 ( )이 지나면 니느웨가 무너지리라 하였더니\"(욘 3)", options:["보름","한 달","사십 일","백이십 일"], answer:2},
  {id:"jon-007", book:"요나", chapter:3, type:"multiple", question:"요나를 통해 하나님의 심판 계획을 들은 니느웨 사람들이 취한 행동이 아닌 것은 무엇입니까? (욘 3)", options:["하나님을 믿었다","금식을 선포했다","하나님께 제물을 봉헌했다","굵은 베 옷을 입었다"], answer:2},
  {id:"jon-008", book:"요나", chapter:4, type:"short", question:"다음 ( ) 안에 순서대로 들어갈 단어들은 무엇입니까?", body:"\"여호와께 기도하여 이르되 여호와여 내가 고국에 있을 때에 이러하겠다고 말씀하지 아니하였나이까 그러므로 내가 빨리 다시스로 도망하였사오니 주께서는 ( )(으)로우시며 ( )(으)로우시며 노하기를 더디하시며 ( )가 크시사 뜻을 돌이켜 재앙을 내리지 아니하시는 하나님이신 줄을 내가 알았음이니이다\"(욘 4)", answer:"은혜, 자비, 인애"},
  {id:"jon-009", book:"요나", chapter:4, type:"fill", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"요나가 성읍에서 나가서 그 성읍 동쪽에 앉아 거기서 자기를 위하여 ( )을 짓고 그 성읍에 무슨 일이 일어나는가를 보려고 그 그늘 아래에 앉았더라\"(욘 4)", answer:"초막"},
  {id:"jon-010", book:"요나", chapter:4, type:"multiple", question:"니느웨 도성에 거주한 사람들이 회개하여 하나님의 심판을 면하자, 요나는 분노했습니다. 이러한 요나를 깨우치기 위해 하나님께서 예비한 것에 포함되지 않는 것은 무엇입니까? (욘 4)", options:["박넝쿨","벌레","흑암","동풍"], answer:2},
  {id:"jon-011", book:"요나", chapter:4, type:"multiple", question:"하나님의 심판을 면한 니느웨에 거주하여 좌우를 분변하지 못하는 사람의 수는 얼마입니까? (욘 4)", options:["칠만여 명","십이만여 명","육십만여 명","백만여 명"], answer:1},
  {id:"mic-001", book:"미가", chapter:1, type:"multiple", question:"미가 선지자가 활동했던 시대에 속하지 않은 유다 왕은 누구입니까? (미 1)", options:["웃시야","요담","아하스","히스기야"], answer:0},
  {id:"mic-002", book:"미가", chapter:1, type:"multiple", question:"이곳은 예루살렘을 방어하는 요새 도시로, 산헤립에 의해 주전 701년에 함락되었습니다. ( ) 안에 공통으로 들어갈 도시는 어디입니까?", body:"\"( ) 주민아 너는 준마에 병거를 메울지어다 ( )은/는 딸 시온의 죄의 근본이니 이는 이스라엘의 허물이 네게서 보였음이니라\"(미 1)", options:["베들레헴","라기스","믹마스","기브아"], answer:1},
  {id:"mic-003", book:"미가", chapter:2, type:"multiple", question:"다음 ( ) 안에 들어갈 장소는 어디입니까?", body:"\"그들이 ( )에서 죄를 꾀하며 악을 꾸미고 날이 밝으면 그 손에 힘이 있으므로 그것을 행하는 자는 화 있을진저\"(미 2)", options:["산당","성소","침상","왕궁"], answer:2},
  {id:"mic-004", book:"미가", chapter:3, type:"short", question:"다음 (㉮)와 (㉯)에 들어갈 대상은 각각 누구입니까?", body:"\"내가 또 이르노니 야곱의 (㉮)들과 이스라엘 족속의 (㉯)들아 들으라 정의를 아는 것이 너희의 본분이 아니냐 ... 야곱 족속의 (㉮)들과 이스라엘 족속의 (㉯)들 곧 정의를 미워하고 정직한 것을 굽게 하는 자들아 원하노니 이 말을 들을지어다\"(미 3)", answer:"우두머리, 통치자"},
  {id:"mic-005", book:"미가", chapter:3, type:"short", question:"다음 본문은 거짓 선지자와 미가 선지자의 차이점을 알려줍니다. ( ) 안에 들어갈 단어는 각각 무엇입니까?", body:"\"내 백성을 유혹하는 선지자들은 이에 물 것이 있으면 ( )을 외치나 그 입에 무엇을 채워 주지 아니하는 자에게는 ( )을 준비하는도다 ... 오직 나는 여호와의 ( )으로 말미암아 능력과 정의와 용기로 충만해져서 야곱의 허물과 이스라엘의 죄를 그들에게 보이리라\"(미 3)", answer:"평강, 전쟁, 영"},
  {id:"mic-006", book:"미가", chapter:3, type:"short", question:"다음 (㉮) (㉯)에 들어갈 대상은 각각 누구입니까? (보기: ① 왕 ② 제사장 ③ 지혜자 ④ 선지자)", body:"\"그들의 우두머리들은 뇌물을 위하여 재판하며 그들의 (㉮)은/는 삯을 위하여 교훈하며 그들의 (㉯)은/는 돈을 위하여 점을 치면서도 여호와를 의뢰하여 이르기를 여호와께서 우리 중에 계시지 아니하냐 재앙이 우리에게 임하지 아니하리라 하는도다\"(미 3)", answer:"㉮ 제사장(②), ㉯ 선지자(④)"},
  {id:"mic-007", book:"미가", chapter:4, type:"short", question:"다음 (㉮)와 (㉯)에 들어갈 단어는 같은 의미를 가집니다. 이 두 단어는 무엇입니까?", body:"\"밧줄 지을 자는 남은 백성이 되게 하며 멀리 쫓겨났던 자들이 강한 나라가 되게 하고 나 여호와가 (㉮)에서 이제부터 영원까지 그들을 다스리리라 하셨나니 너 양 떼의 망대요 딸 (㉯)의 산이여 이전 권능 곧 딸 (㉯)의 나라가 네게로 돌아오리라\"(미 4)", answer:"시온, 예루살렘"},
  {id:"mic-008", book:"미가", chapter:5, type:"multiple", question:"다음 ( ) 안에 들어갈 지명은 무엇입니까?", body:"\"( ) 에브라다야 너는 유다 족속 중에 작을지라도 이스라엘을 다스릴 자가 네게서 내게로 나올 것이라 그의 근본은 상고에, 영원에 있느니라\"(미 5)", options:["헤브론","예루살렘","베들레헴","벧엘"], answer:2},
  {id:"mic-009", book:"미가", chapter:5, type:"multiple", question:"다음은 새로 나타날 통치자에 대한 미가 선지자의 예언입니다. ( ) 안에 들어갈 말은 무엇입니까?", body:"\"이 사람은 ( )이/가 될 것이라 앗수르 사람이 우리 땅에 들어와서 우리 궁들을 밟을 때에는 우리가 일곱 목자와 여덟 군왕을 일으켜 그를 치리니\"(미 5)", options:["평강","위로","구원","공의"], answer:0},
  {id:"mic-010", book:"미가", chapter:6, type:"multiple", question:"순서와 상관없이 ( ) 안에 속하지 않은 인물은 누구입니까?", body:"\"내가 너를 애굽 땅에서 인도해 내어 종 노릇 하는 집에서 속량하였고 ( )와 ( )과 ( )을 네 앞에 보냈느니라\"(미 6)", options:["이드로","모세","아론","미리암"], answer:0},
  {id:"mic-011", book:"미가", chapter:6, type:"short", question:"다음 ( ) 안에 들어갈 인물은 각각 누구입니까?", body:"\"내 백성아 너는 모압 왕 ( )이 꾀한 것과 브올의 아들 ( )이 그에게 대답한 것을 기억하며 싯딤에서부터 길갈까지의 일을 기억하라 그리하면 여호와께서 공의롭게 행하신 일을 알리라 하실 것이니라\"(미 6)", answer:"발락, 발람"},
  {id:"mic-012", book:"미가", chapter:6, type:"multiple", question:"다음 ( ) 안에 들어갈 북 왕국 이스라엘의 대표적인 왕 이름은 각각 무엇입니까?", body:"\"너희가 ( )의 율례와 ( ) 집의 모든 예법을 지키고 그들의 전통을 따르니 내가 너희를 황폐하게 하며 그 주민을 사람의 조소거리로 만들리니 너희가 내 백성의 수욕을 담당하리라\"(미 6)", options:["오므리 - 아합","다윗 - 솔로몬","므낫세 - 요시야","요아스 - 히스기야"], answer:0},
  {id:"mic-013", book:"미가", chapter:7, type:"multiple", question:"타락한 지도자와 재판관을 심판할 자로도 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"그들의 가장 선한 자라도 가시 같고 가장 정직한 자라도 찔레 울타리보다 더하도다 그들의 ( )의 날 곧 그들이 형벌받는 날이 임하였으니 이제는 그들이 요란하리로다\"(미 7)", options:["선지자들","파수꾼들","추수꾼들","사냥꾼들"], answer:1},
  {id:"mic-014", book:"미가", chapter:7, type:"multiple", question:"이스라엘을 멸망시켰던 이방 민족들의 운명을 비유한 말로, ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"그들이 ( )처럼 티끌을 핥으며 땅에 기는 ( )처럼 떨며 그 좁은 구멍에서 나와서 두려워하며 우리 하나님 여호와께로 돌아와서 주로 말미암아 두려워하리이다\"(미 7)", options:["사자 - 뱀","뱀 - 벌레","염소 - 메뚜기","나귀 - 벌"], answer:1},
  {id:"mic-015", book:"미가", chapter:7, type:"short", question:"다음 ( ) 안에 들어갈 족장의 이름은 각각 무엇입니까?", body:"\"주께서 옛적에 우리 조상들에게 맹세하신 대로 ( )에게 성실을 베푸시며 ( )에게 인애를 더하시리이다\"(미 7)", answer:"야곱, 아브라함"},
  {id:"nah-001", book:"나훔", chapter:1, type:"fill", question:"나훔과 요나 선지자는 같은 도시에 대한 하나님의 말씀을 전하였습니다. ( ) 안에 들어갈 도시 이름은 무엇입니까?", body:"\"( )에 대한 경고 곧 엘고스 사람 나훔의 묵시의 글이라\"(나 1)", answer:"니느웨"},
  {id:"nah-002", book:"나훔", chapter:1, type:"fill", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"여호와는 질투하시며 ( )하시는 하나님이시니 여호와는 ( )하시며 ( )하시되 자기를 거스르는 자에게 여호와는 ( )하시며 자기와 대적하는 자에게 ( )를 품으시며\"(나 1)", answer:"보복 / 진노"},
  {id:"nah-003", book:"나훔", chapter:1, type:"fill", question:"다음은 니느웨를 심판하고 이스라엘의 회복을 약속하신 하나님의 선포입니다. ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"이제 네게 지운 그의 ( )를 내가 깨뜨리고 네 ( )을 끊으리라\"(나 1)", answer:"멍에 / 결박"},
  {id:"nah-004", book:"나훔", chapter:1, type:"fill", question:"다음 ( ) 안에 공통으로 들어갈 단어는 무엇입니까?", body:"\"나 여호와가 네게 대하여 명령하였나니 네 이름이 다시는 전파되지 않을 것이며 내가 네 신들의 집에서 새긴 ( )과 부어 만든 ( )을 멸절하며 네 무덤을 준비하리니 이는 네가 쓸모 없게 되었음이라\"(나 1)", answer:"우상"},
  {id:"nah-005", book:"나훔", chapter:1, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?\n\"볼지어다 아름다운 소식을 알리고 ( )을 전하는 자의 발이 산 위에 있도다 유다야 네 절기를 지키고 네 서원을 갚을지어다 악인이 진멸되었으니 그가 다시 네 가운데로 통행하지 아니하리로다 하시느니라\"(나 1)", options:["화평","구원","심판","긍휼"], answer:0},
  {id:"nah-006", book:"나훔", chapter:2, type:"fill", question:"니느웨를 둘러싼 지리적 환경을 설명하는 말로, ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"( )의 수문이 열리고 왕궁이 소멸되며\"(나 2)", answer:"강들"},
  {id:"nah-007", book:"나훔", chapter:3, type:"fill", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"화 있을진저 ( )이여 그 안에는 거짓이 가득하고 포악이 가득하며 탈취가 떠나지 아니하는도다\"(나 3)", answer:"피의 성"},
  {id:"nah-008", book:"나훔", chapter:3, type:"multiple", question:"니느웨의 나약함을 비유한 것으로 ( ) 안에 공통으로 들어가는 곤충은 무엇입니까?\n\"네 방백은 ( ) 같고 너의 장수들은 큰 ( ) 떼가 추운 날에는 울타리에 깃들였다가 해가 뜨면 날아감과 같으니 그 있는 곳을 알 수 없도다\"(나 3)", options:["개구리","황충","메뚜기","파리"], answer:2},
  {id:"nah-009", book:"나훔", chapter:3, type:"multiple", question:"나훔 선지자를 통해 선포된 하나님의 궁극적인 심판 대상으로, ( ) 안에 들어갈 나라는 무엇입니까?\n\"( ) 왕이여 네 목자가 자고 네 귀족은 누워 쉬며 네 백성은 산들에 흩어지나 그들을 모을 사람이 없도다\"(나 3)", options:["아람","앗수르","바벨론","바사"], answer:1},
  {id:"hab-001", book:"하박국", chapter:1, type:"multiple", question:"다음 ( )와 ( )에 들어갈 단어는 무엇입니까?\n\"이러므로 ( )이/가 해이하고 ( )이/가 전혀 시행되지 못하오니 이는 악인이 의인을 에워쌌으므로 ( )이/가 굽게 행하여짐이니이다\"(합 1)", options:["말씀 - 공의","율법 - 정의","제의 - 재판","영혼 - 언약"], answer:1},
  {id:"hab-002", book:"하박국", chapter:1, type:"multiple", question:"유다를 멸망시킨 바벨론을 건설한 나라로, ( ) 안에 들어갈 단어는 무엇입니까?\n\"보라 내가 사납고 성급한 백성 곧 땅이 넓은 곳으로 다니며 자기의 소유가 아닌 거처들을 점령하는 ( ) 사람을 일으켰나니\"(합 1)", options:["아람","앗수르","갈대아","바사"], answer:2},
  {id:"hab-003", book:"하박국", chapter:1, type:"fill", question:"다음 ( )와 ( )에 공통으로 들어갈 단어는 무엇입니까?", body:"\"그것을 낚시로 모두 낚으며 ( )로 잡으며 ( )로 모으고 그리고는 기뻐하고 즐거워하여 ( )에게 제사하며 ( )에게 분향하오니 이는 그것을 힘입어 소득이 풍부하고 먹을 것이 풍성하게 됨이니이다 그가 그물을 떨고 계속하여 여러 나라를 무자비하게 멸망시키는 것이 옳으니이까\"(합 1)", answer:"그물 / 투망"},
  {id:"hab-004", book:"하박국", chapter:2, type:"multiple", question:"다음 ( ) 안에 공통으로 들어갈 단어는 무엇입니까?\n\"여호와께서 내게 대답하여 이르시되 너는 이 ( )을/를 기록하여 판에 명백히 새기되 달려가면서도 읽을 수 있게 하라 이 ( )은/는 정한 때가 있나니 그 종말이 속히 이르겠고 결코 거짓되지 아니하리라 비록 더딜지라도 기다리라 지체되지 않고 반드시 응하리라\"(합 2)", options:["예언","환상","묵시","율법"], answer:2},
  {id:"hab-005", book:"하박국", chapter:2, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?\n\"그는 술을 즐기며 거짓되고 교만하여 가만히 있지 아니하고 ( )처럼 자기의 욕심을 넓히며 또 그는 사망 같아서 족한 줄을 모르고 자기에게로 여러 나라를 모으며 여러 백성을 모으나니\"(합 2)", options:["스올","그림자","흑암","깊음"], answer:0},
  {id:"hab-006", book:"하박국", chapter:2, type:"fill", question:"우상을 만드는 재료로 ( ) 안에 들어갈 단어는 각각 무엇입니까?", body:"\"( )에게 깨라 하며 말하지 못하는 ( )에게 일어나라 하는 자에게 화 있을진저 그것이 교훈을 베풀겠느냐 보라 이는 금과 은으로 입힌 것인즉 그 속에는 생기가 도무지 없느니라\"(합 2)", answer:"나무 / 돌"},
  {id:"hab-007", book:"하박국", chapter:3, type:"multiple", question:"이스라엘 남부에 위치한 장소로 에서(창 36:15)와 연관된 ( )와 이스라엘 백성이 출애굽 후 머물렀던 장소(민 13:3, 26)와 연관된 ( )에 들어갈 지명은 무엇입니까?\n\"하나님이 ( )에서부터 오시며 거룩한 자가 ( ) 산에서부터 오시는도다 (셀라) 그의 영광이 하늘을 덮었고 그의 찬송이 세계에 가득하도다\"(합 3)", options:["데만 - 바란","에돔 - 세일","비돔 - 갈멜","엘림 - 시내"], answer:0},
  {id:"hab-008", book:"하박국", chapter:3, type:"multiple", question:"다음 ( ) 안에 들어갈 표현은 무엇입니까?\n\"주께서 주의 백성을 구원하시려고 ( )를 구원하시려고 나오사 악인의 집의 머리를 치시며 그 기초를 바닥까지 드러내셨나이다 (셀라)\"(합 3)", options:["나라를 타고 오는 자","기름 부음 받은 자","넘어진 자","시온에 거하는 자"], answer:1},
  {id:"hab-009", book:"하박국", chapter:3, type:"short", question:"다음 ( ) 안에 들어갈 신체 부위를 올바른 순서로 나열한 것은 무엇입니까? (보기: ㉠목구멍 ㉡창자 ㉢입 ㉣귀 ㉤입술 ㉥뼈) \"내가 들었으므로 내 ( )이/가 흔들렸고 그 목소리로 말미암아 내 ( )이/가 떨렸도다 무리가 우리를 치러 올라오는 환난 날을 내가 기다리므로 썩이는 것이 내 ( )에 들어왔으며 내 몸은 내 처소에서 떨리는도다\"(합 3)", answer:"창자 - 입술 - 뼈"},
  {id:"zep-001", book:"스바냐", chapter:1, type:"multiple", question:"스바냐 선지자와 관련된 ( ) 안에 들어갈 두 명의 유다 왕은 누구입니까?\n\"아몬의 아들 유다 왕 ( )의 시대에 스바냐에게 임한 여호와의 말씀이라 스바냐는 ( )의 현손이요 아마랴의 증손이요 그다랴의 손자요 구시의 아들이었더라\"(습 1)", options:["히스기야 - 요시야","요시야 - 히스기야","므낫세 - 시드기야","시드기야 - 므낫세"], answer:1},
  {id:"zep-002", book:"스바냐", chapter:1, type:"multiple", question:"다음 ( ) 안에 들어갈 이방신의 이름은 무엇입니까?\n\"내가 유다와 예루살렘의 모든 주민들 위에 손을 펴서 남아 있는 ( )을/를 그 곳에서 멸절하며 그마림이란 이름과 및 그 제사장들을 아울러 멸절하며\"(습 1)", options:["몰렉","바알","다곤","아세라"], answer:1},
  {id:"zep-003", book:"스바냐", chapter:1, type:"short", question:"스바냐서에서 언급한 \"여호와의 큰 날\"과 관련 없는 다섯 날은 무엇입니까? (보기: ①분노의 날 ②구원이 선포된 날 ③환난과 고통의 날 ④기쁨의 노래를 선포하는 날 ⑤황폐와 패망의 날 ⑥악인을 멸하시는 날 ⑦캄캄하고 어두운 날 ⑧역사를 심판하는 날 ⑨교만한 자가 심판받는 날 ⑩구름과 흑암의 날) (습 1)", answer:"②④⑥⑧⑨ (구원이 선포된 날, 기쁨의 노래를 선포하는 날, 악인을 멸하시는 날, 역사를 심판하는 날, 교만한 자가 심판받는 날)"},
  {id:"zep-004", book:"스바냐", chapter:2, type:"multiple", question:"다음 본문에 나오는 도시와 연관되어 하나님의 심판을 받은 곳으로, ( ) 안에 들어갈 나라의 이름은 무엇입니까?\n\"가사는 버림을 당하며 아스글론은 폐허가 되며 아스돗은 대낮에 쫓겨나며 에그론은 뽑히리라 해변 주민 그렛 족속에게 화 있을진저 ( ) 사람의 땅 가나안아 여호와의 말씀이 너희를 치나니 내가 너를 멸하여 주민이 없게 하리라\"(습 2)", options:["애굽","앗수르","바벨론","블레셋"], answer:3},
  {id:"zep-005", book:"스바냐", chapter:2, type:"fill", question:"구약에서 하나님의 심판을 받는 도시로, '악한 도시'를 상징하는 대표적인 두 도시의 이름은 무엇입니까?", body:"\"그러므로 만군의 여호와 이스라엘의 하나님이 말하노라 내가 나의 삶을 두고 맹세하노니 장차 모압은 ( ) 같으며 암몬 자손은 ( ) 같을 것이라 찔레가 나며 소금 구덩이가 되어 영원히 황폐하리라 내 백성의 남은 자들이 그들을 노략하며 나의 남은 백성이 그것을 기업으로 얻을 것이라\"(습 2)", answer:"소돔 / 고모라"},
  {id:"zep-006", book:"스바냐", chapter:2, type:"fill", question:"다음 본문에서 제시된 지형적 위치와 연관된 곳으로, 하나님의 심판을 받은 ( ) 안에 들어갈 나라와 도시의 이름은 무엇입니까?", body:"\"여호와가 북쪽을 향하여 손을 펴서 ( )를 멸하며 ( )를 황폐하게 하여 사막 같이 메마르게 하리니\"(습 2)", answer:"앗수르 / 니느웨"},
  {id:"zep-007", book:"스바냐", chapter:3, type:"multiple", question:"스바냐 3장에서 다음과 같은 이유로 하나님의 심판을 받는 도시는 어디입니까?\n\"패역하고 더러운 곳, 포학한 그 성읍이 화 있을진저 그가 명령을 듣지 아니하며 교훈을 받지 아니하며 여호와를 의뢰하지 아니하며 자기 하나님에게 가까이 나아가지 아니하였도다\"(습 3)", options:["사마리아","예루살렘","벧엘","므깃도"], answer:1},
  {id:"zep-008", book:"스바냐", chapter:3, type:"short", question:"다음 ( ) 안에 들어갈 대상은 각각 누구입니까? (보기: ①선지자들 ②지혜자들 ③제사장들 ④서기관들 ⑤레위인들 ⑥재판관들)\n\"그의 ( )은 경솔하고 간사한 사람들이요 그의 ( )은 성소를 더럽히고 율법을 범하였도다\"(습 3)", answer:"①③ 선지자들 / 제사장들"},
  {id:"zep-009", book:"스바냐", chapter:3, type:"fill", question:"다음 ( ) 안에 들어갈 표현은 무엇입니까?", body:"\"이스라엘의 ( )는 악을 행하지 아니하며 거짓을 말하지 아니하며 입에 거짓된 혀가 없으며 먹고 누울지라도 그들을 두렵게 할 자가 없으리라\"(습 3)", answer:"남은 자"},
  {id:"zep-010", book:"스바냐", chapter:3, type:"fill", question:"다음 ( ) 안에 공통으로 들어갈 단어는 무엇입니까?", body:"\"( )가 네 형벌을 제거하였고 네 원수를 쫓아냈으며 이스라엘 왕 ( )가 네 가운데 계시니 네가 다시는 화를 당할까 두려워하지 아니할 것이라\"(습 3)", answer:"여호와"},
  {id:"hag-001", book:"학개", chapter:1, type:"short", question:"학개서에서 선포된 가장 중요한 주제는 무엇입니까?", answer:"예루살렘 성전 재건"},
  {id:"hag-002", book:"학개", chapter:1, type:"fill", question:"다음 ( ) 안에 들어갈 유다 총독과 대제사장은 누구입니까?", body:"\"다리오 왕 제이년 여섯째 달 곧 그 달 초하루에 여호와의 말씀이 선지자 학개로 말미암아 스알디엘의 아들 유다 총독 ( )과 여호사닥의 아들 대제사장 ( )에게 임하니라 이르시되\"(학 1)", answer:"스룹바벨 / 여호수아"},
  {id:"hag-003", book:"학개", chapter:1, type:"multiple", question:"다음 본문은 예루살렘 성전 재건에 영성을 다하지 않은 이스라엘 백성에게 임한 하나님의 심판 내용입니다. ( ) 안에 들어갈 단어는 무엇입니까?\n\"그러므로 너희로 말미암아 하늘은 ( )을/를 그쳤고 땅은 산물을 그쳤으며 내가 이 땅과 산과 곡물과 새포도주와 기름과 땅에 나는 소산과 사람과 가축과 손으로 수고하는 모든 일에 ( )을/를 들게 하였느니라\"(학 1)", options:["이슬 - 한재","비 - 홍수","안개 - 기근","빛 - 강풍"], answer:0},
  {id:"hag-004", book:"학개", chapter:2, type:"fill", question:"다음 ( ) 안에 공통으로 들어갈 단어는 무엇입니까?", body:"\"이 성전의 나중 ( )이 이전 ( )보다 크리라 만군의 여호와의 말이니라 내가 이 곳에 평강을 주리라 만군의 여호와의 말이니라\"(학 2)", answer:"영광"},
  {id:"hag-005", book:"학개", chapter:2, type:"multiple", question:"학개 선지자가 활동했을 때 통치된 왕으로, ( ) 안에 들어갈 바사 왕은 누구입니까?\n\"( ) 왕 제이년 아홉째 달 이십사일에 여호와의 말씀이 선지자 학개에게 임하니라 이르시되\"(학 2)", options:["고레스","다리오","아하수에로","아닥사스다"], answer:1},
  {id:"hag-006", book:"학개", chapter:2, type:"multiple", question:"학개 선지자는 율법에 관하여 누군가에게 질문을 했습니다. ( ) 안에 공통으로 들어갈 대상은 누구입니까?\n\"사람이 옷자락에 거룩한 고기를 쌌는데 그 옷자락이 만일 떡에나 국에나 포도주에나 기름에나 다른 음식물에 닿았으면 그것이 성물이 되겠느냐 하라 학개가 물으매 ( )이 대답하여 아니로다 하니라 하더라 학개가 이르되 시체를 만져서 부정하게 된 자가 만일 그것들 가운데 하나를 만지면 그것이 부정하겠느냐 하니 ( )이 대답하여 이르되 부정하리라 하더라\"(학 2)", options:["선지자들","제사장들","서기관들","레위인들"], answer:1},
  {id:"hag-007", book:"학개", chapter:2, type:"short", question:"다음 본문에서 \"돌이 돌 위에 놓이지 아니하였던 때\"는 어떤 때입니까?\n\"이제 원하건대 너희는 오늘부터 이전 곧 여호와의 전에 돌이 돌 위에 놓이지 아니하였던 때를 기억하라\"(학 2)", answer:"예루살렘 성전 재건이 일시적으로 중단되었던 때"},
  {id:"zec-001", book:"스가랴", chapter:1, type:"multiple", question:"스가랴 선지자와 함께 활동한 선지자는 누구입니까?(슥 1)", options:["이사야","미가","스바냐","학개"], answer:3},
  {id:"zec-002", book:"스가랴", chapter:1, type:"short", question:"스가랴는 바사의 어느 왕 시대에 하나님께 말씀을 받았습니까?(슥 1)", answer:"다리오"},
  {id:"zec-003", book:"스가랴", chapter:1, type:"multiple", question:"다음 ( ) 안에 들어갈 숫자는 얼마입니까?\n\"여호와의 천사가 대답하여 이르되 만군의 여호와여 여호와께서 언제까지 예루살렘과 유다 성읍들을 불쌍히 여기지 아니하시려 하나이까 이를 노하신 지 ( )년이 되었나이다 하매\"(슥 1)", options:["사십","오십","육십","칠십"], answer:3},
  {id:"zec-004", book:"스가랴", chapter:2, type:"fill", question:"스가랴가 본 두 번째 환상에 등장하는 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"내가 또 눈을 들어 본즉 한 사람이 ( )을 손에 잡았기로 네가 어디로 가느냐 물은즉 그가 내게 대답하되 예루살렘을 측량하여 그 너비와 길이를 보고자 하노라 하더라\"(슥 2)", answer:"측량줄"},
  {id:"zec-005", book:"스가랴", chapter:3, type:"short", question:"다음 (㉮)와 (㉯)에 들어갈 대상은 각각 누구입니까?\n\"대제사장 여호수아는 여호와의 (㉮) 앞에 섰고 (㉯)은 그의 오른쪽에 서서 그를 대적하는 것을 여호와께서 내게 보이시니라\"(슥 3)", answer:"㉮ 천사(여호와의 사자) / ㉯ 사탄"},
  {id:"zec-006", book:"스가랴", chapter:4, type:"multiple", question:"다음 본문에서 하나님은 누군가에게 말씀하셨습니다. ( ) 안에 들어갈 인물은 누구입니까?\n\"그가 내게 대답하여 이르되 여호와께서 ( )에게 하신 말씀이 이러하니라 만군의 여호와께서 말씀하시되 이는 힘으로 되지 아니하며 능력으로 되지 아니하고 오직 나의 영으로 되느니라\"(슥 4)", options:["여호수아","스룹바벨","느헤미야","에스라"], answer:1},
  {id:"zec-007", book:"스가랴", chapter:4, type:"fill", question:"이것은 스가랴가 본 다섯 번째 환상에 등장하는 도구로, 정확한 심판의 기준점을 상징합니다. ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"작은 일의 날이라고 멸시하는 자가 누구냐 사람들이 스룹바벨의 손에 ( )이 있음을 보고 기뻐하리라 이 일곱은 온 세상에 두루 다니는 여호와의 눈이라 하니라\"(슥 4)", answer:"다림줄"},
  {id:"zec-008", book:"스가랴", chapter:4, type:"multiple", question:"스가랴가 본 네 번째 환상 중 순금 등잔대 옆에 있는 두 감람나무가 의미하는 것은 무엇입니까?\n\"내가 그에게 물어 이르되 등잔대 좌우의 두 감람나무는 무슨 뜻이니까 하고 ... 이르되 이는 ( ) 둘이니 그 앞에 서 있는 자라 하더라\"(슥 4)", options:["기름 부음 받은 자","세상을 새롭게 통치할 왕","세상을 심판할 자","유다와 예루살렘을 구원할 자"], answer:0},
  {id:"zec-009", book:"스가랴", chapter:5, type:"multiple", question:"스가랴가 본 여섯 번째 환상인 '날아가는 두루마리'는 상징적인 의미를 지니고 있습니다. 다음 ( ) 안에 들어갈 말은 무엇입니까?\n\"그가 내게 이르되 이는 ( )이라 도둑질하는 자는 그 이쪽 글대로 끊어지고 맹세하는 자는 그 저쪽 글대로 끊어지리라 하니\"(슥 5)", options:["온 땅에 전하는 구원의 말씀","온 땅 위에 내리는 저주","온 땅 위에 내리는 축복","온 땅에 임하는 심판"], answer:1},
  {id:"zec-010", book:"스가랴", chapter:5, type:"multiple", question:"일곱 번째 환상에서 스가랴는 곡식 또는 고체의 양을 측정하는 용기 중 하나인 '이것' 가운데 앉아 있는 한 여인을 보았습니다. ( ) 안에 들어가는 단어는 무엇입니까?\n\"이 ( ) 가운데에는 한 여인이 앉았느니라 하니 그 때에 둥근 납 한 조각이 들리더라\"(슥 5)", options:["오멜","스아","에바","호멜"], answer:2},
  {id:"zec-011", book:"스가랴", chapter:6, type:"multiple", question:"스가랴가 본 마지막 환상은 네 병거에 대한 환상입니다. ( ) 안에 들어갈 단어는 무엇입니까?\n\"내가 또 눈을 들어 본즉 네 병거가 두 산 사이에서 나오는데 그 산은 ( ) 산이더라\"(슥 6)", options:["금","은","구리","옥"], answer:2},
  {id:"zec-012", book:"스가랴", chapter:6, type:"multiple", question:"스가랴가 본 마지막 환상은 네 병거에 대한 환상입니다. 이 병거들을 끈 네 가지 색의 말이 아닌 것은 무엇입니까?(슥 6)", options:["붉은 말들","갈색 말들","흰 말들","어룽진 말들"], answer:1},
  {id:"zec-013", book:"스가랴", chapter:6, type:"short", question:"하나님은 스가랴 선지자에게 누구의 머리 위에 면류관을 씌우라고 명령하셨습니까?(슥 6)", answer:"여호수아(대제사장 여호수아)"},
  {id:"zec-014", book:"스가랴", chapter:6, type:"fill", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"말하여 이르기를 만군의 여호와께서 이같이 말씀하시되 보라 ( )이라 이름하는 사람이 자기 곳에서 돋아나서 여호와의 전을 건축하리라\"(슥 6)", answer:"싹"},
  {id:"zec-015", book:"스가랴", chapter:7, type:"multiple", question:"다음 ( ) 안에 들어갈 숫자는 무엇입니까?\n\"온 땅의 백성과 제사장들에게 이르라 너희가 ( ) 동안 다섯째 달과 일곱째 달에 금식하고 애통하였거니와 그 금식이 나를 위하여, 나를 위하여 한 것이냐\"(슥 7)", options:["십이 년","오십 년","육십 년","칠십 년"], answer:3},
  {id:"zec-016", book:"스가랴", chapter:7, type:"fill", question:"완악한 이스라엘 백성을 비유적으로 표현한 말로, ( ) 안에 들어갈 암석은 무엇입니까?", body:"\"그 마음을 ( ) 같게 하여 율법과 만군의 여호와가 그의 영으로 옛 선지자들을 통하여 전한 말을 듣지 아니하므로 큰 진노가 만군의 여호와께로부터 나왔도다\"(슥 7)", answer:"금강석"},
  {id:"zec-017", book:"스가랴", chapter:8, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?\n\"여호와가 이같이 말하노라 내가 시온에 돌아와 예루살렘 가운데에 거하리니 예루살렘은 ( )의 성읍이라 일컫겠고 만군의 여호와의 산은 성산이라 일컫게 되리라\"(슥 8)", options:["평강","진리","구원","기쁨"], answer:1},
  {id:"zec-018", book:"스가랴", chapter:8, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?\n\"곧 ( )의 씨앗을 얻을 것이라 포도나무가 열매를 맺으며 땅이 산물을 내며 하늘은 이슬을 내리리니 내가 이 남은 백성으로 이 모든 것을 누리게 하리라\"(슥 8)", options:["평강","진리","구원","기쁨"], answer:0},
  {id:"zec-019", book:"스가랴", chapter:9, type:"multiple", question:"다음 ( ) 안에 들어갈 나라 이름은 무엇입니까?\n\"내가 유다를 당긴 활로 삼고 에브라임을 끼운 화살로 삼았으니 시온아 내가 네 자식들을 일으켜 ( ) 자식들을 치게 하며 너를 용사의 칼과 같게 하리라\"(슥 9)", options:["앗수르","바벨론","바사","헬라"], answer:3},
  {id:"zec-020", book:"스가랴", chapter:9, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?\n\"여호와께서 그들 위에 나타나서 그의 화살을 번개 같이 쏘아내실 것이며 주 여호와께서 나팔을 불게 하시며 남방 ( )을/를 타고 가실 것이라\"(슥 9)", options:["회오리바람","독수리","폭풍우","홍수"], answer:0},
  {id:"zec-021", book:"스가랴", chapter:10, type:"multiple", question:"구약에서 대표적인 우상으로 여겨졌던 ( ) 안에 들어갈 단어는 무엇입니까?\n\"( )은 허탄한 것을 말하며 복술자는 진실하지 않은 것을 보고 거짓 꿈을 말하며 그 위로가 헛되므로 백성들이 양 같이 유리하며 목자가 없으므로 곤고를 당하나니라\"(슥 10)", options:["드라빔들","목상들","아세라들","놋뱀"], answer:0},
  {id:"zec-022", book:"스가랴", chapter:11, type:"short", question:"다음 (㉮), (㉯), (㉰)에 들어갈 나무의 이름은 무엇입니까?\n\"레바논아 네 문을 열고 불이 네 (㉮)을/를 사르게 하라 너 (㉯)이여 곡할지어다 (㉰)이/가 넘어졌고 아름다운 나무들이 쓰러졌음이로다 바산의 (㉰)들아 곡할지어다 무성한 숲이 엎드러졌도다\"(슥 11)\n보기: ㉠백향목 ㉡무화과나무 ㉢포도나무 ㉣잣나무 ㉤상수리나무 ㉥감람나무\n① ㉠-㉣-㉤  ② ㉡-㉢-㉣  ③ ㉢-㉤-㉥  ④ ㉣-㉠-㉥", answer:"① (㉮ 백향목 / ㉯ 잣나무 / ㉰ 상수리나무)"},
  {id:"zec-023", book:"스가랴", chapter:11, type:"fill", question:"가룟 유다의 비참한 최후(마 27:9-10)와 연관된 것으로, (㉮)와 (㉯)에 들어갈 말은 무엇입니까?", body:"\"내가 그들에게 이르되 너희가 좋게 여기거든 내 품삯을 내게 주고 그렇지 아니하거든 그만두라 그들이 곧 (㉮) 삼십 개를 달아서 내 품삯을 삼은지라 여호와께서 내게 이르시되 ... 내가 곧 그 (㉮) 삼십 개를 여호와의 전에서 (㉯)에게 던지고\"(슥 11)", answer:"㉮ 은 / ㉯ 토기장이"},
  {id:"zec-024", book:"스가랴", chapter:11, type:"short", question:"스가랴서에서 상징적인 의미로 언급되는 두 지팡이의 이름은 무엇입니까?(슥 11)", answer:"은총, 연합"},
  {id:"zec-025", book:"스가랴", chapter:12, type:"fill", question:"다음 ( ) 안에 들어갈 각각의 단어는 무엇입니까?", body:"\"이스라엘에 관한 여호와의 경고의 말씀이라 여호와 곧 ( )을 펴시며 ( )의 터를 세우시며 사람 안에 심령을 지으신 이가 이르시되\"(슥 12)", answer:"하늘 / 땅"},
  {id:"zec-026", book:"스가랴", chapter:12, type:"fill", question:"구약과 신약에 언급되는 대표적인 심판의 장소로, ( ) 안에 들어갈 장소는 어디입니까?", body:"\"그 날에 예루살렘에 큰 애통이 있으리니 ( ) 골짜기 하다드림몬에 있던 애통과 같을 것이라\"(슥 12)", answer:"므깃도"},
  {id:"zec-027", book:"스가랴", chapter:12, type:"multiple", question:"순서와 상관없이 ( ) 안에 들어가지 않는 인물은 누구입니까?\n\"온 땅 각 족속이 따로 애통하되 ( )의 족속이 따로 하고 그들의 아내들이 따로 하며 ( )의 족속이 따로 하고 그들의 아내들이 따로 하며 ( )의 족속이 따로 하고 그들의 아내들이 따로 하며 ( )의 족속이 따로 하고 그들의 아내들이 따로 하리라\"(슥 12)", options:["다윗","나단","베냐민","시므이"], answer:2},
  {id:"zec-028", book:"스가랴", chapter:13, type:"multiple", question:"다음 ( ) 안에 들어갈 단어로 옳지 않은 것은 무엇입니까?\n\"말하기를 나는 (①)가 아니요 나는 (②)라 내가 어려서부터 (③)의 (④)이 되었노라 할 것이요\"(슥 13)", options:["선지자","농부","하나님","종"], answer:2},
  {id:"zec-029", book:"스가랴", chapter:13, type:"fill", question:"다음 (㉮)와 (㉯)에 들어갈 숫자는 얼마입니까?", body:"\"여호와가 말하노라 이 온 땅에서 (㉮)는 멸망하고 (㉯)은 거기 남으리니 내가 그 (㉮)을 불 가운데에 던져 은 같이 연단하며 금 같이 시험할 것이라 그들이 내 이름을 부르리니 ...\"(슥 13)", answer:"㉮ 삼분의 이 / ㉯ 삼분의 일"},
  {id:"zec-030", book:"스가랴", chapter:14, type:"multiple", question:"다음 ( ) 안에 들어갈 유다 왕은 누구입니까?\n\"그 산 골짜기는 아셀까지 이를 것이며 너희가 그 산 골짜기로 도망하되 유다 왕 ( ) 때에 지진을 피하여 도망하던 것 같이 하리라 나의 하나님 여호와께서 임하실 것이요 모든 거룩한 자들이 주와 함께 하리라\"(슥 14)", options:["웃시야","요담","아하스","히스기야"], answer:0},
  {id:"zec-031", book:"스가랴", chapter:14, type:"fill", question:"다음 ( ) 안에 들어갈 장소는 어디입니까?", body:"\"그 날에는 생수가 ( )에서 솟아나서 절반은 동해로, 절반은 서해로 흐를 것이라 여름에도 겨울에도 그러하리라\"(슥 14)", answer:"예루살렘"},
  {id:"zec-032", book:"스가랴", chapter:14, type:"multiple", question:"다음 ( ) 안에 공통으로 들어갈 절기는 무엇입니까?\n\"예루살렘을 치러 왔던 이방 나라들 중에 남은 자가 해마다 올라와서 그 왕 만군의 여호와께 경배하며 ( )을 지킬 것이라 ...\"(슥 14)", options:["유월절","무교절","칠칠절","초막절"], answer:3},
  {id:"mal-001", book:"말라기", chapter:1, type:"short", question:"'말라기'의 뜻은 무엇입니까?(말 1)", answer:"나의 사자(使者)"},
  {id:"mal-002", book:"말라기", chapter:1, type:"multiple", question:"다음 성경 본문에서 언급한 인물과 연관된 ( ) 안에 들어갈 민족은 누구입니까?\n\"( )에 대하여는 미워하였으며 그의 산들을 황폐하게 하였고 그의 산업을 광야의 이리들에게 넘겼느니라 ( )은 말하기를 우리가 무너뜨림을 당하였으나 황폐된 곳을 다시 쌓으리라 하거니와 나 만군의 여호와는 이르노라 그들은 쌓을지라도 나는 헐리라 ...\"(말 1)", options:["모압","암몬","에돔","아람"], answer:2},
  {id:"mal-003", book:"말라기", chapter:1, type:"fill", question:"하나님은 말라기 선지자를 통해 더러운 제물을 봉헌하는 것은 '이것'을 경멸하고 더럽히는 것이라고 말씀하셨습니다. ( ) 안에 공통으로 들어갈 '이것'은 무엇입니까?", body:"\"너희가 더러운 떡을 내 제단에 드리고도 말하기를 우리가 어떻게 주를 더럽게 하였나이까 하는도다 이는 너희가 여호와의 ( )은 경멸히 여길 것이라 말하기 때문이라 ... 너희는 말하기를 여호와의 ( )은 더러워졌고 그 위에 있는 과일 곧 먹을 것은 경멸히 여길 것이라 하여 내 이름을 더럽히는도다\"(말 1)", answer:"식탁"},
  {id:"mal-004", book:"말라기", chapter:2, type:"multiple", question:"다음 ( ) 안에 공통으로 들어갈 단어는 무엇입니까?\n\"만군의 여호와가 이르노라 너희가 만일 듣지 아니하며 마음에 두지 아니하여 내 이름을 영화롭게 하지 아니하면 내가 너희에게 ( )을/를 내려 너희의 복을 ( )하리라 내가 이미 ( )하였노니 이는 너희가 그것을 마음에 두지 아니하였음이니라\"(말 2)", options:["벌","심판","저주","진노"], answer:2},
  {id:"mal-005", book:"말라기", chapter:2, type:"multiple", question:"다음 ( ) 안에 공통으로 들어갈 지파의 이름은 무엇입니까?\n\"만군의 여호와가 이르노라 내가 이 명령을 너희에게 내린 것은 ( )와/과 세운 나의 언약이 항상 있게 하려 함인 줄을 너희가 알리라 ( )와 세운 나의 언약은 생명과 평강의 언약이라 ...\"(말 2)", options:["유다","베냐민","레위","에브라임"], answer:2},
  {id:"mal-006", book:"말라기", chapter:2, type:"multiple", question:"다음 ( ) 안에 공통으로 들어갈 대상은 누구입니까?\n\"( )의 입술은 지식을 지켜야 하겠고 사람들이 그의 입에서 율법을 구하여야 할 것이니 ( )은 만군의 여호와의 사자가 됨이거늘\"(말 2)", options:["제사장","선지자","서기관","재판관"], answer:0},
  {id:"mal-007", book:"말라기", chapter:3, type:"multiple", question:"히브리어 '말라기'의 뜻과 연관된 말로, ( ) 안에 공통으로 들어갈 단어는 무엇입니까?\n\"만군의 여호와가 이르노라 보라 내가 내 ( )를 보내리니 그가 내 앞에서 길을 준비할 것이요 또 너희가 구하는 바 주가 갑자기 그의 성전에 임하시리니 곧 너희가 사모하는 바 언약의 ( )가 임하실 것이라\"(말 3)", options:["선지자","사자","중재자","목자"], answer:1},
  {id:"mal-008", book:"말라기", chapter:3, type:"fill", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?", body:"\"만군의 여호와가 이르노라 너희의 온전한 ( )을 창고에 들여 나의 집에 양식이 있게 하고 그것으로 나를 시험하여 내가 하늘 문을 열고 너희에게 복을 쌓을 곳이 없도록 붓지 아니하나 보라\"(말 3)", answer:"십일조"},
  {id:"mal-009", book:"말라기", chapter:3, type:"multiple", question:"다음 ( ) 안에 들어갈 단어는 무엇입니까?\n\"그 때에 여호와를 경외하는 자들이 피차에 말하매 여호와께서 그것을 분명히 들으시고 여호와를 경외하며 그의 이름을 존중히 여기는 자들을 위하여 여호와 앞에 있는 ( )에 기록하셨느니라\"(말 3)", options:["생명책","기념책","돌판","두루마리책"], answer:1},
  {id:"mal-010", book:"말라기", chapter:3, type:"short", question:"다음 (㉮)와 (㉯)에 들어갈 표현은 각각 무엇입니까?\n\"그 때에 너희가 돌아와서 (㉮)을/를 분별하고 하나님을 (㉯)을/를 분별하리라\"(말 3)\n보기: ①지혜자와 어리석은 자 ②의인과 악인 ③유다 백성과 이방인들 ④섬기는 자와 섬기지 아니하는 자 ⑤찬양하는 자와 찬양하지 아니하는 자 ⑥높이는 자와 멸시하는 자", answer:"㉮-② (의인과 악인) / ㉯-④ (섬기는 자와 섬기지 아니하는 자)"},
  {id:"mal-011", book:"말라기", chapter:4, type:"fill", question:"다음 ( ) 안에 들어갈 지명은 무엇입니까?", body:"\"너희는 내가 ( )에서 온 이스라엘을 위하여 내 종 모세에게 명령한 법 곧 율례와 법도를 기억하라\"(말 4)", answer:"호렙"},
  {id:"mal-012", book:"말라기", chapter:4, type:"multiple", question:"다음 ( ) 안에 들어갈 인물은 누구입니까?\n\"보라 여호와의 크고 두려운 날이 이르기 전에 내가 선지자 ( )을/를 너희에게 보내리니\"(말 4)", options:["사무엘","엘리야","엘리사","이사야"], answer:1},

  {id:"mrk-030", book:"마가복음", chapter:6, type:"fill", question:"다음 ( ) 안에 들어갈 말은 무엇입니까?", body:"예수께서 떡 다섯 개와 물고기 두 마리를 가지사 하늘을 우러러 축사하시고 떡을 떼어 제자들에게 주어 사람들에게 나누어 주게 하시고 또 물고기 두 마리도 모든 사람에게 나누시매 다 배불리 먹고 남은 떡 조각과 물고기를 ( ) 바구니에 차게 거두었으며", answer:"열두"},

  {id:"mrk-034", book:"마가복음", chapter:7, type:"fill", question:"다음 ( ) 안에 들어갈 말은 무엇입니까?", body:"바리새인들과 모든 유대인들은 장로들의 전통을 지키어 손을 잘 씻지 않고서는 음식을 먹지 아니하며 또 시장에서 돌아와서도 ( )을 뿌리지 않고서는 먹지 아니하며 그 외에도 여러 가지를 지키어 오는 것이 있으니 잔과 주발과 놋그릇을 씻음이러라", answer:"물"},

  {id:"mrk-049", book:"마가복음", chapter:10, type:"multiple", question:"재물이 많은 사람(부자 청년)이 예수님께 무엇을 해야 영생을 얻을 수 있냐고 질문했습니다. 이때 예수님은 이 사람에게 부족한 것이 무엇이라고 말씀하셨습니까?(막 10)", options:["부족한 것이 너무 많아 말로 표현하기 힘듦", "십계명을 지키지 않음", "자기 재산을 다 팔아서 가난한 자들에게 주고 예수를 따라야 함", "기도가 부족함"], answer:2},
  {id:"mrk-050", book:"마가복음", chapter:10, type:"multiple", question:"예수님은 부자가 하나님 나라에 들어가는 것은 이 동물이 바늘귀로 나가는 것보다 힘들다고 말씀하셨습니다. 이 동물은 무엇입니까?(막 10)", options:["고래", "코끼리", "뱀", "낙타"], answer:3},
  {id:"mrk-051", book:"마가복음", chapter:8, type:"multiple", question:"예수님이 자신의 수난과 죽음을 제자들에게 미리 알리신 것을 ‘수난예고’라고 합니다. 마가복음에서 예수님은 몇 번에 걸쳐 수난예고를 하셨습니까?", options:["1번", "2번", "3번", "4번"], answer:2},
  {id:"mrk-052", book:"마가복음", chapter:10, type:"multiple", question:"다음 ( ) 안에 들어갈 말은 무엇입니까? “나와 복음을 위하여 집이나 형제나 자매나 어머니나 아버지나 자식이나 전토를 버린 자는 현세에 있어 집과 형제와 자매와 어머니와 자식과 전토를 백 배나 받되 ( )를 겸하여 받고 내세에 영생을 받지 못할 자가 없느니라”(막 10)", options:["박해", "사랑", "은혜", "축복"], answer:0},

  {id:"mrk-054", book:"마가복음", chapter:10, type:"short", question:"예수님이 여리고에서 나가실 때 길가에서 소경을 만나셨습니다. 예수님이 그의 눈을 뜨게 해주시자 그는 즉시 예수님을 따라 나섰습니다. 이 소경의 이름은 무엇입니까?(막 10)", answer:"바디매오"},
  {id:"mrk-055", book:"마가복음", chapter:10, type:"multiple", question:"예수님이 디매오의 아들인 눈먼 거지 바디매오를 고쳐주신 장소는 어디입니까?(막 10)", options:["가이사랴", "여리고", "가버나움", "예루살렘"], answer:1},
  {id:"mrk-056", book:"마가복음", chapter:11, type:"multiple", question:"예수님은 예루살렘으로 들어가실 때 나귀 새끼를 타셨습니다. 이때 사람들은 예수님을 보고 “( ) 찬송하리로다 주의 이름으로 오시는 이여”라고 외치면서 환영했습니까? ( ) 안에 들어갈 말은 무엇입니까?(막 11)", options:["할렐루야", "아멘", "호산나", "임마누엘"], answer:2},
  {id:"mrk-057", book:"마가복음", chapter:11, type:"multiple", question:"다음 ( ) 안에 들어갈 말은 무엇입니까? “이에 가르쳐 이르시되 기록된 바 내 집은 ( )이라 칭함을 받으리라고 하지 아니하였느냐 너희는 강도의 소굴을 만들었도다 하시매”(막 11)", options:["손으로 만들지 않은 곳", "교회", "회당", "만민이 기도하는 집"], answer:3},
  {id:"mrk-058", book:"마가복음", chapter:12, type:"multiple", question:"마가복음에 나오는 포도원 농부의 비유에서 포도원 주인이 포도원의 농부들에게 보낸 아들은 주인에게 어떤 아들이었습니까?(막 12)", options:["존대하는 아들", "귀중한 아들", "사랑하는 아들", "소중히 여기는 아들"], answer:2},

  {id:"mrk-060", book:"마가복음", chapter:12, type:"multiple", question:"다음 중 부활이 없다고 주장한 자들은 누구입니까?(막 12)", options:["바리새인", "사두개인", "서기관", "대제사장"], answer:1},

  {id:"mrk-062", book:"마가복음", chapter:12, type:"multiple", question:"자기의 모든 소유 곧 생활비 전부를 헌금한 과부를 보신 예수님은 이 과부가 모든 사람보다 더 많은 헌금을 했다고 칭찬하셨습니다. 이 과부는 얼마를 헌금했습니까?(막 12)", options:["한 렙돈", "두 렙돈", "세 렙돈", "네 렙돈"], answer:1},
  {id:"mrk-063", book:"마가복음", chapter:13, type:"multiple", question:"다음 ( ) 안에 들어갈 말은 무엇입니까? “사람들이 너희를 끌어다가 넘겨 줄 때에 무슨 말을 할까 미리 염려하지 말고 무엇이든지 그 때에 너희에게 주시는 그 말을 하라 말하는 이는 너희가 아니요 ( )이시니라”(막 13)", options:["하나님", "주님", "성령", "인자"], answer:2},

  {id:"mrk-068", book:"마가복음", chapter:13, type:"multiple", question:"예수님은 한 식물을 가려 다음과 같이 말씀하셨습니다. “그 가지가 연하여지고 잎사귀를 내면 여름이 가까운 줄 아나니” 이는 어떤 식물을 가리켜 하신 말씀입니까?(막 13)", options:["무화과나무", "포도나무", "감람나무", "겨자나무"], answer:0},
  {id:"mrk-069", book:"마가복음", chapter:13, type:"multiple", question:"마가복음 13장에서 예수님은 종말의 때에 발생할 일들을 알려주십니다. 예수님은 이것을 어떤 때라고 표현하셨습니까?(막 13)", options:["순교의 날", "환난의 날", "멸망의 날", "회개의 날"], answer:1},
  {id:"mrk-070", book:"마가복음", chapter:13, type:"multiple", question:"종말이 가까웠을 때, 이적과 기사를 행하면서 신앙인들을 미혹하려는 사람들은 누구입니까?(막 13)", options:["권세를 가진 자", "거짓 교사들", "거짓 그리스도들과 거짓 선지자들", "악한 천사들"], answer:2},

  {id:"mrk-072", book:"마가복음", chapter:14, type:"multiple", question:"한 여자가 예수님께 향유를 부은 일은 베다니 시몬이라는 사람의 집에서 있었던 일입니다. 이 시몬은 어떤 사람입니까?(막 14)", options:["바리새인 시몬", "소경 시몬", "율법학자 시몬", "나병 환자 시몬"], answer:3},

  {id:"mrk-076", book:"마가복음", chapter:14, type:"multiple", question:"예수님이 제자들과 더불어 유월절 음식을 드셨던 곳은 어디입니까?(막 14)", options:["큰 다락방", "큰 객실", "넓은 마당", "예루살렘 성전"], answer:0},
  {id:"mrk-077", book:"마가복음", chapter:14, type:"multiple", question:"예수님이 유대인들 앞에서 심문을 받으실 때, 대제사장들과 ( )이/가 예수를 죽이려고 그를 칠 증거를 찾았지만 찾지 못했습니다. ( )에 들어갈 말은 무엇입니까?(막 14)", options:["율법학자들", "바리새인들", "로마인들", "온 공회"], answer:3},

  {id:"mrk-079", book:"마가복음", chapter:14, type:"fill", question:"다음 ( ) 안에 들어갈 말은 무엇입니까?", body:"베드로가 여짜오되 다 버릴지라도 나는 그리하지 않겠나이다 예수께서 이르시되 내가 진실로 네게 이르노니 오늘 이 밤 닭이 ( ) 번 울기 전에 네가 ( ) 번 나를 부인하리라", answer:"두 / 세"},

  {id:"mrk-082", book:"마가복음", chapter:14, type:"fill", question:"다음 성경 구절은 예수님이 겟세마네 동산에서 기도하신 내용입니다. ( ) 안에 들어갈 하나님의 호칭은 무엇입니까?", body:"이르시되 ( ) 아버지여 아버지께는 모든 것이 가능하오니 이 잔을 내게서 옮기시옵소서 그러나 나의 원대로 마시옵고 아버지의 원대로 하옵소서 하시고", answer:"아빠"},

const INTERVALS = {
  again: 1,    // 다시 → 다음 테스트
  hard: 3,     // 어려움 → 3 테스트 후
  good: 7,     // 보통 → 7 테스트 후

function initProgress() {
  return {
    nextSession: state.sessionCount, // 즉시 출제 가능
    lastSession: -1,
    totalReviews: 0,
    lapses: 0,
    isNew: true,
    lastGrade: null,
    consecutiveEasy: 0
  };
}

function applyGrade(prog, quality) {
  // quality: 0=다시, 3=어려움, 4=보통, 5=쉬움
  prog.totalReviews += 1;
  prog.lastSession = state.sessionCount;
  prog.isNew = false;

  let gap;
  if (quality === 0) {
    gap = INTERVALS.again;
    prog.lapses += 1;
    prog.consecutiveEasy = 0;
    prog.lastGrade = "again";
  } else if (quality === 3) {
    gap = INTERVALS.hard;
    prog.consecutiveEasy = 0;
    prog.lastGrade = "hard";
  } else if (quality === 4) {
    gap = INTERVALS.good;
    prog.consecutiveEasy = 0;
    prog.lastGrade = "good";
  } else {
    gap = INTERVALS.easy;
    prog.consecutiveEasy += 1;
    prog.lastGrade = "easy";
  }
  prog.nextSession = state.sessionCount + gap;
  return prog;
}

// 큐 빌딩
// ===========================
function filterByCategory(q) {
  if (state.category === "verse" && q.type !== "verse") return false;
  if (state.category === "question" && q.type === "verse") return false;
  if (state.bookFilter && q.book !== state.bookFilter) return false;
  if (state.chapterFilter !== null && q.chapter !== state.chapterFilter) return false;
  return true;
}

const BATCH_SIZE = 15;

function buildQueue() {
  // 새 세션 시작: 카운터 증가
  state.sessionCount += 1;
  sessionStarted = false;

  const dueCards = [];
  const newCards = [];
  const otherCards = [];

  QUESTIONS.filter(filterByCategory).forEach(q => {
    const p = state.progress[q.id];
    if (!p || p.isNew) {
      newCards.push(q);
    } else if (p.nextSession <= state.sessionCount) {
      dueCards.push({q, p});
    } else {
      otherCards.push({q, p});
    }
  });

  // 책 별 풀기 모드: PDF 원본 순서대로, 안 본 것 우선
  if (state.bookFilter) {
    newCards.sort((a, b) => a.id.localeCompare(b.id));
    dueCards.sort((a, b) => a.q.id.localeCompare(b.q.id));
    otherCards.sort((a, b) => {
      const diff = a.p.nextSession - b.p.nextSession;
      if (diff !== 0) return diff;
      return a.q.id.localeCompare(b.q.id);
    });
    const ordered = [...newCards, ...dueCards.map(x => x.q), ...otherCards.map(x => x.q)];
    saveProgress();
    return ordered.slice(0, BATCH_SIZE);
  }

  // 일반 모드: 항상 15문제 고정 (복습 우선 → 새 문제 → 아직 안 된 것)
  dueCards.sort((a, b) => a.p.nextSession - b.p.nextSession);
  shuffle(newCards);
  otherCards.sort((a, b) => a.p.nextSession - b.p.nextSession);

  const pool = [
    ...dueCards.map(x => x.q),
    ...newCards,
    ...otherCards.map(x => x.q)
  ];
  saveProgress();
  return pool.slice(0, BATCH_SIZE);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function interleave(reviews, news) {
  const result = [];
  const total = reviews.length + news.length;
  if (total === 0) return [];
  let ri = 0, ni = 0;
  for (let i = 0; i < total; i++) {
    // 대략 4:1 비율 (복습:새것)
    const wantNew = (news.length > ni) && (i % 4 === 2 || reviews.length <= ri);
    if (wantNew) result.push(news[ni++]);
    else if (ri < reviews.length) result.push(reviews[ri++]);
    else if (ni < news.length) result.push(news[ni++]);
  }
  return result;
}

function renderBookSelect() {
  const byBook = {};
  QUESTIONS.forEach(q => {
    if (q.type === "verse") return; // 암송은 별도 메뉴
    if (!byBook[q.book]) byBook[q.book] = 0;
    byBook[q.book] += 1;
  });
  // 성경 순서 유지하려고 QUESTIONS 등장 순서대로
  const seen = new Set();
  const ordered = [];
  QUESTIONS.forEach(q => {
    if (q.type === "verse") return;
    if (!seen.has(q.book)) { seen.add(q.book); ordered.push(q.book); }
  });

  // 구약/신약 필터 적용
  const filtered = ordered.filter(book => {
    if (testamentFilter === 'old') return !isNT(book);
    if (testamentFilter === 'new') return isNT(book);
    return true;
  });
  const otCount = ordered.filter(b => !isNT(b)).length;
  const ntCount = ordered.filter(b => isNT(b)).length;

  let html = backBtn('home') + '<h2 style="margin-bottom:6px;">책을 선택하세요</h2>';

    + `<button class="${testamentFilter==='new'?'active':''}" onclick="setTestament('new')">신약 (${ntCount})</button>`
    + '</nav>';
  html += '<div class="book-grid">';
  filtered.forEach(book => {
    const seen = QUESTIONS.filter(q => q.book === book && q.type !== "verse" && state.progress[q.id] && !state.progress[q.id].isNew).length;
    html += `<div class="book-card" onclick="navTo('study', {category:'question', book:'${book}', chapter:null})">

// 빈칸 처리 (빈칸연습 모드) - 3 어절 중 1개 정도를 빈칸 처리
function makeBlankVerse(text) {
  const words = text.split(/\s+/).filter(w => w.length > 0);
  return words.map((w, i) => {
    if ((i % 3 === 2) && w.length >= 2) {
      return `<span class="blank">${escapeHtml(w)}</span>`;
    }
    return escapeHtml(w);
  }).join(' ');
}

  const typeLabel = {
    "multiple": "객관식",
    "fill": "빈칸 채우기",
    "short": "주관식",
    "verse": state.verseMode === "test" ? "암송 · Test" : "암송 · 빈칸연습"
  }[q.type] || "문제";

  const total = currentQueue.length;
  const cur = currentIdx + 1;
  const progress = Math.round(((cur-1) / total) * 100);

  let cardHTML = backBtn(studyBackTarget()) + `
    <div style="font-size:13px; color:var(--text-light); margin-bottom:8px;">${studyTitle()}</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div class="card">
      <div class="q-meta">
        <span class="q-tag">${typeLabel}</span>
        <span>${cur} / ${total} · ${q.book} ${q.chapter ? q.chapter+'장' : ''}</span>
      </div>
  `;

  if (q.type === "verse") {
    // 암송 모드 분기
    cardHTML += `<div class="q-text"><b>${escapeHtml(q.reference || q.book)}</b></div>`;
    if (state.verseMode === "test") {
      cardHTML += `<div style="font-size:13px; color:var(--text-light); margin-bottom:8px;">구절의 첫 글자만 힌트예요. 위 본문을 보며 구절을 떠올려보세요.</div>`;
      cardHTML += `<div class="verse-hint">${escapeHtml(makeFirstCharHint(q.answer))}</div>`;
    } else {
      cardHTML += `<div style="font-size:13px; color:var(--text-light); margin-bottom:8px;">빈칸을 마음 속으로 채워가며 외워보세요.</div>`;
      cardHTML += `<div class="verse-blank">${makeBlankVerse(q.answer)}</div>`;
    }
    cardHTML += `<button class="btn btn-block" style="margin-top:12px;" onclick="revealAnswer()">정답 보기</button>`;
  } else {
    cardHTML += `<div class="q-text">${escapeHtml(q.question)}</div>`;
    if (q.body) {
      cardHTML += `<div class="q-body">${escapeHtml(q.body)}</div>`;
    }
    if (q.type === "multiple") {
      cardHTML += '<div id="optionsBox">';
      q.options.forEach((opt, i) => {
        const mark = ['①','②','③','④','⑤'][i] || (i+1)+'.';
        cardHTML += `<div class="option" data-idx="${i}" onclick="selectOption(${i})">${mark} ${escapeHtml(opt)}</div>`;
      });
      cardHTML += '</div>';
      cardHTML += `<button id="checkBtn" class="btn btn-block" style="margin-top:12px;" onclick="checkMultiple()" disabled>정답 확인</button>`;
    } else {
      cardHTML += `
        <textarea id="userAnswer" placeholder="답을 적어보세요 (선택 사항 - 머릿속으로 떠올린 뒤 정답 보기를 눌러도 돼요)"></textarea>
        <button class="btn btn-block" style="margin-top:12px;" onclick="revealAnswer()">정답 보기</button>
      `;
    }
  }

  cardHTML += `<div id="answerArea"></div></div>`;
  view.innerHTML = cardHTML;
}

let selectedOption = -1;
function selectOption(i) {
  selectedOption = i;
  document.querySelectorAll('.option').forEach((el, idx) => {
    el.classList.toggle('selected', idx === i);
  });
  document.getElementById('checkBtn').disabled = false;
}

function checkMultiple() {
  const q = currentCard;
  // 숫자 인덱스(기존) 또는 문자열(여호수아 등 신규) 둘 다 지원
  const correctIdx = typeof q.answer === 'number'
    ? q.answer
    : q.options.findIndex(o => o === q.answer);
  const correctText = q.options[correctIdx] ?? q.answer;

  const opts = document.querySelectorAll('.option');
  opts.forEach((el, idx) => {
    el.style.pointerEvents = 'none';
    if (idx === correctIdx) el.classList.add('correct');
    else if (idx === selectedOption) el.classList.add('incorrect');
  });
  document.getElementById('checkBtn').style.display = 'none';

  const isCorrect = selectedOption === correctIdx;
  // 틀렸을 때 정답 텍스트를 명시적으로 표시
  if (!isCorrect) {
    const area = document.getElementById('answerArea');
    area.innerHTML = `
      <div class="answer-box">
        <div class="answer-label">정답</div>
        ${escapeHtml(correctText)}
      </div>
    `;
  }
  showGradeButtons(isCorrect);
}

function revealAnswer() {
  revealed = true;
  const q = currentCard;
  const area = document.getElementById('answerArea');
  area.innerHTML = `
    <div class="answer-box">
      <div class="answer-label">정답</div>
      ${escapeHtml(q.answer)}
    </div>
  `;
  showGradeButtons();
}

function showGradeButtons(autoGraded = null) {
  const area = document.getElementById('answerArea');
  const helpText = autoGraded === true ? '<p style="margin-top:14px; color: var(--success); font-weight:500;">✓ 맞췄어요!</p>' :
                   autoGraded === false ? '<p style="margin-top:14px; color: var(--error); font-weight:500;">✗ 틀렸어요. 다시 보고 평가해주세요.</p>' :
                   '<p style="margin-top:14px; font-size:13px; color: var(--text-light);">얼마나 잘 알고 있었나요? 솔직하게 평가하면 더 효과적으로 복습할 수 있어요.</p>';
  area.innerHTML += helpText + `
    <div class="btn-row">
      <button class="btn btn-grade btn-again" onclick="grade(0)">다시<br><small style="opacity:.8;font-size:11px;">다음 테스트</small></button>
      <button class="btn btn-grade btn-hard" onclick="grade(3)">어려움<br><small style="opacity:.8;font-size:11px;">${INTERVALS.hard} 테스트 후</small></button>
      <button class="btn btn-grade btn-good" onclick="grade(4)">보통<br><small style="opacity:.8;font-size:11px;">${INTERVALS.good} 테스트 후</small></button>
      <button class="btn btn-grade btn-easy" onclick="grade(5)">쉬움<br><small style="opacity:.8;font-size:11px;">${INTERVALS.easy} 테스트 후</small></button>
    </div>
  `;
}

function grade(quality) {
  const q = currentCard;
  let p = state.progress[q.id] || initProgress();
  p = applyGrade(p, quality);
  state.progress[q.id] = p;
  saveProgress();
  currentIdx++;
  selectedOption = -1;
  renderStudy();
}

// ===========================
// 설정 화면
// ===========================
function renderSettings() {
  const authHtml = state.user
    ? `<p>로그인됨: <b>${state.user.name || state.user.email}</b></p>
       <p style="font-size: 13px; color: var(--text-light); margin-top: 6px;">진도가 자동으로 클라우드에 동기화됩니다.</p>
       <button class="btn btn-secondary" style="margin-top: 12px;" onclick="signOut()">로그아웃</button>`
    : `<p style="margin-bottom: 12px;">현재 진도는 이 기기에만 저장되고 있어요.</p>
       <p style="font-size: 13px; color: var(--text-light); margin-bottom: 12px;">구글 로그인하면 폰과 PC에서 진도를 자동 동기화할 수 있어요.</p>
       <button class="btn" onclick="signIn()">🔐 구글로 로그인 (Firebase 설정 후 활성화)</button>
       <p style="font-size: 12px; color: var(--text-light); margin-top: 14px;">※ 이 프로토타입은 아직 Firebase 설정 전이에요.</p>`;

  document.getElementById('viewArea').innerHTML = backBtn('home') + `
    <h2 style="margin-bottom:14px;">설정</h2>

    <div class="card">
      <h3 style="margin-bottom: 12px;">계정</h3>
      ${authHtml}
    </div>

    <div class="card">
      <h3 style="margin-bottom: 8px;">학습 설정</h3>
      <p style="font-size:13px; color:var(--text-light);">매 세트마다 15문제씩 출제됩니다. 복습이 필요한 문제가 우선 출제되고, 없으면 새 문제가 나와요.</p>
    </div>

    <div class="card">
      <h3 style="margin-bottom: 12px;">매일 알림</h3>
      <p style="font-size: 13px; color: var(--text-light); margin-bottom: 12px;">
        매일 정해진 시간에 공부 알림을 받을 수 있어요.
      </p>
      <label style="display:block; margin-bottom: 12px;">
        알림 시간:
        <input type="time" id="reminderTime" value="${settings.reminderTime || ''}" style="margin-left:8px; padding:6px; font-size:14px;">
      </label>
      <button class="btn" onclick="saveReminderTime()">알림 켜기 / 저장</button>
      <button class="btn btn-secondary" onclick="disableReminder()" style="margin-left:6px;">알림 끄기</button>
      <div id="notifStatus" style="font-size:13px; margin-top:12px; color: var(--text-light);"></div>
      <hr style="margin: 18px 0; border:0; border-top:1px solid var(--border);">
      <p style="font-size: 13px; color: var(--text-light); margin-bottom: 10px;">
        앱이 닫혀있을 때도 알림을 받으려면 휴대폰 캘린더에 매일 반복 일정으로 등록하는 게 가장 확실해요.
      </p>
      <button class="btn btn-secondary btn-block" onclick="downloadICS()">📅 캘린더에 매일 반복 일정 추가 (.ics 다운로드)</button>
    </div>

    <div class="card">
      <h3 style="margin-bottom: 12px;">데이터</h3>
      <button class="btn btn-secondary btn-block" onclick="exportData()">내 진도 내보내기 (JSON)</button>
      <button class="btn btn-secondary btn-block" onclick="document.getElementById('importFile').click()">진도 가져오기</button>
      <button class="btn btn-secondary btn-block" onclick="resetProgress()" style="color: var(--error); border-color: var(--error);">진도 초기화</button>
    </div>

function signIn() {
  showToast("Firebase 설정이 필요해요.");
}
function signOut() {
  state.user = null;
  document.getElementById('userInfo').textContent = '로그아웃';
  if (state.view === 'settings') renderSettings();
}

// ===========================
// 저장/불러오기
// ===========================
function saveProgress() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      progress: state.progress,
      sessionCount: state.sessionCount,
      category: state.category
    }));
  } catch(e) {
    console.error('저장 실패', e);
  }
}
function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      state.progress = data.progress || {};
      state.sessionCount = data.sessionCount || 0;
      // 카테고리는 현재 view 진입 시 결정되므로 저장된 값 무시
    } else {
      // v1(SM-2) → v2 마이그레이션
      const oldRaw = localStorage.getItem(STORAGE_KEY_OLD);
      if (oldRaw) {
        const oldProgress = JSON.parse(oldRaw);
        const migrated = {};
        Object.entries(oldProgress).forEach(([qid, p]) => {
          migrated[qid] = {
            nextSession: 0,
            lastSession: -1,
            totalReviews: p.repetitions || 0,
            lapses: p.lapses || 0,
            isNew: false,
            lastGrade: null,
            consecutiveEasy: 0
          };
        });
        state.progress = migrated;
        showToast("이전 진도를 새 방식으로 옮겼어요");
      }
    }
    const settingsRaw = localStorage.getItem(SETTINGS_KEY);
    if (settingsRaw) settings = {...settings, ...JSON.parse(settingsRaw)};
  } catch(e) {
    console.error('불러오기 실패', e);
  }
}
function saveSettings() {
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
}

// ===========================
// 알림 기능
// ===========================
let reminderTimeoutId = null;

function scheduleNextReminder() {
  if (reminderTimeoutId) clearTimeout(reminderTimeoutId);
  if (!settings.reminderTime || !settings.notificationEnabled) return;
  if (Notification.permission !== "granted") return;

  const [hh, mm] = settings.reminderTime.split(':').map(Number);
  const now = new Date();
  const next = new Date();
  next.setHours(hh, mm, 0, 0);
  if (next <= now) next.setDate(next.getDate() + 1);

  const msUntil = next - now;
  reminderTimeoutId = setTimeout(() => {
    showStudyNotification();
    scheduleNextReminder(); // 다음 날도 예약
  }, msUntil);

  console.log(`다음 알림: ${next.toLocaleString('ko-KR')}`);
}

function showStudyNotification() {
  if (Notification.permission !== "granted") return;
  const due = QUESTIONS.filter(q => {
    const p = state.progress[q.id];
    return !p || p.nextSession <= state.sessionCount + 1;
  }).length;
  new Notification("📖 성경 문제집 공부 시간!", {
    body: due > 0 ? `오늘 풀 문제가 ${due}개 있어요.` : "오늘의 학습을 시작해보세요.",
    icon: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%234a7c59'/><text x='50%25' y='65%25' font-size='60' text-anchor='middle' fill='white'>📖</text></svg>",
    tag: "bible-study-daily"
  });
}

async function saveReminderTime() {
  const t = document.getElementById('reminderTime').value;
  if (!t) { showToast("시간을 선택해주세요"); return; }

  settings.reminderTime = t;

  if (!("Notification" in window)) {
    showToast("이 브라우저는 알림을 지원하지 않아요");
    document.getElementById('notifStatus').textContent =
      "이 브라우저는 알림을 지원하지 않아요. 캘린더 등록을 이용해주세요.";
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
    return;
  }

  if (Notification.permission === "default") {
    const result = await Notification.requestPermission();
    if (result !== "granted") {
      showToast("알림 권한이 거부되었어요");
      document.getElementById('notifStatus').textContent =
        "브라우저 알림 권한이 차단되어 있어요. 브라우저 설정에서 이 사이트의 알림을 허용해주세요.";
      return;
    }
  }
  if (Notification.permission === "denied") {
    document.getElementById('notifStatus').textContent =
      "브라우저 알림 권한이 차단되어 있어요. 주소창 좌측 자물쇠 아이콘 → 알림 허용으로 바꿔주세요.";
    return;
  }

  settings.notificationEnabled = true;
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
  scheduleNextReminder();
  document.getElementById('notifStatus').textContent =
    `✓ 매일 ${t}에 알림을 보내드릴게요. (앱이 열려있거나 백그라운드에 있을 때 동작)`;
  showToast("알림이 설정되었어요");
}

function disableReminder() {
  settings.notificationEnabled = false;
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
  if (reminderTimeoutId) clearTimeout(reminderTimeoutId);
  document.getElementById('notifStatus').textContent = "알림이 꺼졌어요.";
  showToast("알림 꺼짐");
}

function downloadICS() {
  const t = document.getElementById('reminderTime').value || settings.reminderTime || "07:00";
  const [hh, mm] = t.split(':').map(Number);
  // 오늘 날짜에 시작, 매일 반복
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hh, mm, 0);
  if (start <= now) start.setDate(start.getDate() + 1);
  const end = new Date(start.getTime() + 10 * 60 * 1000); // 10분 일정

  const fmt = (d) => d.toISOString().replace(/[-:]/g, '').replace(/\.\d{3}/, '');
  const url = location.href;
  const ics = `BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//Bible Workbook//Daily Reminder//KO
CALSCALE:GREGORIAN
BEGIN:VEVENT
UID:bible-study-${Date.now()}@local
DTSTAMP:${fmt(new Date())}
DTSTART:${fmt(start)}
DTEND:${fmt(end)}
RRULE:FREQ=DAILY
SUMMARY:📖 성경 문제집 공부
DESCRIPTION:오늘의 성경 문제 공부 시간이에요.\\n앱 열기: ${url}
URL:${url}
BEGIN:VALARM
TRIGGER:-PT0M
ACTION:DISPLAY
DESCRIPTION:📖 성경 문제집 공부 시간!
END:VALARM
END:VEVENT
END:VCALENDAR`;

  const blob = new Blob([ics], {type: 'text/calendar'});
  const dlUrl = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = dlUrl;
  a.download = '성경공부-매일알림.ics';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(dlUrl);
  showToast("캘린더 파일을 받았어요. 열면 매일 알림이 등록됩니다");
}

function updateNotifStatus() {
  const el = document.getElementById('notifStatus');
  if (!el) return;
  if (!("Notification" in window)) {
    el.textContent = "이 브라우저는 알림 미지원. 캘린더 등록을 이용해주세요.";
  } else if (Notification.permission === "denied") {
    el.textContent = "브라우저 알림이 차단되어 있어요. 사이트 설정에서 허용해주세요.";
  } else if (settings.notificationEnabled && settings.reminderTime) {
    el.textContent = `✓ 매일 ${settings.reminderTime}에 알림 (앱이 열려있거나 백그라운드일 때)`;
  } else {
    el.textContent = "알림이 꺼져 있어요.";
  }
}
function exportData() {
  const data = JSON.stringify({progress: state.progress, settings, exportedAt: new Date().toISOString()}, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `bible-progress-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.progress) state.progress = data.progress;
      if (data.settings) settings = {...settings, ...data.settings};
      saveProgress();
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
      showToast("진도를 가져왔어요");
      currentQueue = [];
      navTo('home');
    } catch(e) {
      showToast("파일이 올바르지 않아요");
    }
  };
  reader.readAsText(file);
}
function resetProgress() {
  if (!confirm('정말 모든 진도를 초기화할까요? 되돌릴 수 없어요.')) return;
  state.progress = {};
  state.sessionCount = 0;
  saveProgress();
  currentQueue = [];
  showToast("초기화 완료");
  navTo('home');
}

// ===========================
// 유틸
// ===========================
function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ===========================
// 초기 실행
// ===========================
loadProgress();
// 사용자 정보 표시 동기화
if (state.user) {
  document.getElementById('userInfo').textContent = state.user.name || state.user.email || '로그인됨';
}
navTo('home');

// 저장된 알림 시간이 있으면 다음 알림 예약
if (settings.notificationEnabled && settings.reminderTime && "Notification" in window
    && Notification.permission === "granted") {
  scheduleNextReminder();
}

// 페이지가 다시 보이게 되면 알림 재예약 (탭이 백그라운드에 오래 있다가 돌아온 경우)
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && settings.notificationEnabled) {
    scheduleNextReminder();
  }
});
</script>
